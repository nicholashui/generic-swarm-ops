  <text x="435" y="400" text-anchor="middle" class="text">Workflows</text>

  <rect x="560" y="340" width="170" height="85" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="645" y="375" text-anchor="middle" class="label">Phase 9</text>
  <text x="645" y="400" text-anchor="middle" class="text">Realtime run UI</text>

  <rect x="770" y="340" width="170" height="85" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="855" y="375" text-anchor="middle" class="label">Phase 10</text>
  <text x="855" y="400" text-anchor="middle" class="text">Approvals</text>

  <rect x="980" y="340" width="170" height="85" class="box" fill="#dcfce7" stroke="#16a34a"/>
