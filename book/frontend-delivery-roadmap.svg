  <text x="1275" y="400" text-anchor="middle" class="text">Evaluations + processes</text>

  <rect x="360" y="570" width="250" height="95" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="485" y="608" text-anchor="middle" class="label">Phase 13</text>
  <text x="485" y="636" text-anchor="middle" class="text">Audit logs + settings</text>

  <rect x="790" y="570" width="270" height="95" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="925" y="608" text-anchor="middle" class="label">Phase 14</text>
  <text x="925" y="636" text-anchor="middle" class="text">Quality, security, release</text>

  <line x1="210" y1="152" x2="240" y2="152" class="arrow"/>
  <line x1="400" y1="152" x2="430" y2="152" class="arrow"/>
  <line x1="590" y1="152" x2="620" y2="152" class="arrow"/>
  <line x1="780" y1="152" x2="810" y2="152" class="arrow"/>
  <line x1="970" y1="152" x2="1000" y2="152" class="arrow"/>
  <line x1="1160" y1="152" x2="1190" y2="152" class="arrow"/>

  <line x1="1270" y1="195" x2="1270" y2="255" class="arrow"/>
  <line x1="1270" y1="255" x2="225" y2="255" class="arrow"/>
  <line x1="225" y1="255" x2="225" y2="340" class="arrow"/>

  <line x1="310" y1="382" x2="350" y2="382" class="arrow"/>
  <line x1="520" y1="382" x2="560" y2="382" class="arrow"/>
  <line x1="730" y1="382" x2="770" y2="382" class="arrow"/>
  <line x1="940" y1="382" x2="980" y2="382" class="arrow"/>
  <line x1="1150" y1="382" x2="1190" y2="382" class="arrow"/>

  <line x1="1275" y1="425" x2="1275" y2="500" class="arrow"/>
  <line x1="1275" y1="500" x2="485" y2="500" class="arrow"/>
  <line x1="485" y1="500" x2="485" y2="570" class="arrow"/>

  <line x1="610" y1="617" x2="790" y2="617" class="arrow"/>

  <rect x="120" y="760" width="1160" height="70" class="box" fill="#ffffff" stroke="#94a3b8"/>
  <text x="700" y="802" text-anchor="middle" class="text">The roadmap moves from contracts and design governance, to product surfaces, to realtime operations, and finally to release confidence.</text>
</svg>
