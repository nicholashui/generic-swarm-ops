<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .text { font: 14px Arial, sans-serif; fill: #334155; }
      .box { rx: 16; ry: 16; stroke-width: 2.5; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#head); }
    </style>
    <marker id="head" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="#f8fafc"/>
  <text x="700" y="48" text-anchor="middle" class="title">Frontend Delivery Roadmap</text>

  <rect x="50" y="110" width="160" height="85" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="130" y="145" text-anchor="middle" class="label">Phase 0</text>
  <text x="130" y="170" text-anchor="middle" class="text">Contracts</text>

  <rect x="240" y="110" width="160" height="85" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="320" y="145" text-anchor="middle" class="label">Phase 1</text>
  <text x="320" y="170" text-anchor="middle" class="text">Project setup</text>

  <rect x="430" y="110" width="160" height="85" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="510" y="145" text-anchor="middle" class="label">Phase 2</text>
  <text x="510" y="170" text-anchor="middle" class="text">Trae + MCP</text>

  <rect x="620" y="110" width="160" height="85" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="700" y="145" text-anchor="middle" class="label">Phase 3</text>
  <text x="700" y="170" text-anchor="middle" class="text">Design system</text>

  <rect x="810" y="110" width="160" height="85" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="890" y="145" text-anchor="middle" class="label">Phase 4</text>
  <text x="890" y="170" text-anchor="middle" class="text">Auth UI</text>

  <rect x="1000" y="110" width="160" height="85" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="1080" y="145" text-anchor="middle" class="label">Phase 5</text>
  <text x="1080" y="170" text-anchor="middle" class="text">App shell</text>

  <rect x="1190" y="110" width="160" height="85" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="1270" y="145" text-anchor="middle" class="label">Phase 6</text>
  <text x="1270" y="170" text-anchor="middle" class="text">Dashboard</text>

  <rect x="140" y="340" width="170" height="85" class="box" fill="#dcfce7" stroke="#16a34a"/>
