<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="860" viewBox="0 0 1300 860">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 14px Arial, sans-serif; fill: #64748b; }
      .label { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .text { font: 14px Arial, sans-serif; fill: #334155; }
      .small { font: 13px Arial, sans-serif; fill: #475569; }
      .box { rx: 16; ry: 16; stroke-width: 2.5; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#head); }
    </style>
    <marker id="head" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1300" height="860" fill="#f8fafc"/>
  <text x="650" y="48" text-anchor="middle" class="title">Generic Swarm Business Operating System</text>
  <text x="650" y="76" text-anchor="middle" class="subtitle">Product bar ~100 · Postgres control plane · dual Trae / Grok harness</text>

  <rect x="450" y="100" width="400" height="80" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="650" y="134" text-anchor="middle" class="label">Events / Requests</text>
  <text x="650" y="160" text-anchor="middle" class="text">documents · experts · event logs · user requests</text>

  <line x1="650" y1="180" x2="650" y2="220" class="arrow"/>

  <rect x="430" y="220" width="440" height="80" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="650" y="254" text-anchor="middle" class="label">Intake + Risk Router</text>
  <text x="650" y="280" text-anchor="middle" class="text">classifies risk tier · routes into bounded paths</text>

  <line x1="650" y1="300" x2="650" y2="340" class="arrow"/>

  <rect x="390" y="340" width="520" height="90" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="650" y="378" text-anchor="middle" class="label">Business Orchestrator</text>
  <text x="650" y="408" text-anchor="middle" class="text">state-graph · adapters · tool_effects · human gates</text>

  <line x1="650" y1="430" x2="650" y2="470" class="arrow"/>

  <!-- six layers — wider boxes, no overlap -->
  <rect x="40" y="480" width="190" height="110" class="box" fill="#ffffff" stroke="#2563eb"/>
  <text x="135" y="520" text-anchor="middle" class="label">Process</text>
  <text x="135" y="544" text-anchor="middle" class="label">Intelligence</text>
  <text x="135" y="570" text-anchor="middle" class="small">disk artifacts</text>

  <rect x="250" y="480" width="190" height="110" class="box" fill="#ffffff" stroke="#16a34a"/>
  <text x="345" y="520" text-anchor="middle" class="label">Knowledge</text>
  <text x="345" y="544" text-anchor="middle" class="label">+ Memory</text>
  <text x="345" y="570" text-anchor="middle" class="small">Tier 0/1 · K1-lite</text>

  <rect x="460" y="480" width="190" height="110" class="box" fill="#ffffff" stroke="#d97706"/>
  <text x="555" y="520" text-anchor="middle" class="label">Execution</text>
  <text x="555" y="544" text-anchor="middle" class="label">Workflows</text>
  <text x="555" y="570" text-anchor="middle" class="small">DNA + adapters</text>

  <rect x="670" y="480" width="190" height="110" class="box" fill="#ffffff" stroke="#7c3aed"/>
  <text x="765" y="520" text-anchor="middle" class="label">Evolution</text>
  <text x="765" y="544" text-anchor="middle" class="label">Sandbox</text>
  <text x="765" y="570" text-anchor="middle" class="small">reflect · canary</text>

  <rect x="880" y="480" width="180" height="110" class="box" fill="#ffffff" stroke="#dc2626"/>
  <text x="970" y="520" text-anchor="middle" class="label">Governance</text>
  <text x="970" y="544" text-anchor="middle" class="label">+ Security</text>
  <text x="970" y="570" text-anchor="middle" class="small">tiers · red-team</text>

  <rect x="150" y="640" width="1000" height="140" class="box" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="650" y="680" text-anchor="middle" class="label">Shipped control plane</text>
  <text x="650" y="712" text-anchor="middle" class="text">Postgres runtime_state · auto-reflect lessons · Improve UI · /app/evolution archive</text>
  <text x="650" y="744" text-anchor="middle" class="small">Authority lives in the graph (code); models provide intelligence inside bounded nodes</text>
</svg>
