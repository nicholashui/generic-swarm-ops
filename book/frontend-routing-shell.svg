<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="820" viewBox="0 0 1300 820">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .text { font: 15px Arial, sans-serif; fill: #334155; }
      .mono { font: 15px 'Courier New', monospace; fill: #1e293b; }
      .box { rx: 18; ry: 18; stroke-width: 2.5; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#head); }
    </style>
    <marker id="head" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1300" height="820" fill="#f8fafc"/>
  <text x="650" y="50" text-anchor="middle" class="title">Routing And App Shell Structure</text>

  <rect x="70" y="110" width="240" height="580" class="box" fill="#ffffff" stroke="#2563eb"/>
  <text x="190" y="148" text-anchor="middle" class="label">Public Routes</text>
  <text x="100" y="190" class="mono">/</text>
  <text x="100" y="220" class="mono">/login</text>
  <text x="100" y="250" class="mono">/register</text>
  <text x="100" y="280" class="mono">/forgot-password</text>
  <text x="100" y="310" class="mono">/reset-password</text>
  <text x="100" y="340" class="mono">/accept-invite</text>
  <text x="100" y="390" class="text">Handles entry, identity, and redirect behavior.</text>

  <rect x="370" y="110" width="250" height="580" class="box" fill="#ffffff" stroke="#16a34a"/>
  <text x="495" y="148" text-anchor="middle" class="label">Protected App Shell</text>
  <text x="400" y="190" class="mono">/app/*</text>
  <text x="400" y="230" class="text">Persistent shell contains:</text>
  <text x="400" y="262" class="text">- Sidebar</text>
  <text x="400" y="290" class="text">- Header</text>
  <text x="400" y="318" class="text">- Breadcrumbs</text>
  <text x="400" y="346" class="text">- Command palette</text>
  <text x="400" y="374" class="text">- Organization switcher</text>
  <text x="400" y="402" class="text">- User menu</text>
  <text x="400" y="430" class="text">- Notifications</text>
  <text x="400" y="460" class="text">- Responsive mobile nav</text>

  <rect x="680" y="110" width="250" height="580" class="box" fill="#ffffff" stroke="#d97706"/>
  <text x="805" y="148" text-anchor="middle" class="label">Main Navigation Groups</text>
  <text x="710" y="190" class="text">Main: Dashboard, Agents, Workflows, Approvals</text>
  <text x="710" y="228" class="text">Data: Knowledge, Memory</text>
  <text x="710" y="266" class="text">Quality: Evaluations, Processes</text>
  <text x="710" y="304" class="text">Security: Audit Logs</text>
  <text x="710" y="342" class="text">Admin: Settings</text>
  <text x="710" y="390" class="text">Permissions can hide or disable actions,</text>
  <text x="710" y="418" class="text">but backend authorization remains final.</text>

  <rect x="990" y="110" width="240" height="580" class="box" fill="#ffffff" stroke="#7c3aed"/>
  <text x="1110" y="148" text-anchor="middle" class="label">High-Value Pages</text>
  <text x="1020" y="190" class="mono">/app</text>
  <text x="1020" y="220" class="mono">/app/agents</text>
  <text x="1020" y="250" class="mono">/app/workflows</text>
  <text x="1020" y="280" class="mono">/app/workflow-runs/[runId]</text>
  <text x="1020" y="310" class="mono">/app/approvals</text>
  <text x="1020" y="340" class="mono">/app/knowledge</text>
  <text x="1020" y="370" class="mono">/app/evaluations</text>
  <text x="1020" y="400" class="mono">/app/audit-logs</text>
  <text x="1020" y="430" class="mono">/app/settings/*</text>

  <line x1="310" y1="400" x2="370" y2="400" class="arrow"/>
  <line x1="620" y1="400" x2="680" y2="400" class="arrow"/>
  <line x1="930" y1="400" x2="990" y2="400" class="arrow"/>

  <rect x="180" y="730" width="940" height="60" class="box" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="650" y="767" text-anchor="middle" class="text">Route protection improves UX, but hidden buttons and protected routes are never a substitute for backend permission checks.</text>
</svg>
