<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="820" viewBox="0 0 1300 820">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .text { font: 15px Arial, sans-serif; fill: #334155; }
      .box { rx: 18; ry: 18; stroke-width: 2.5; }
    </style>
  </defs>
  <rect width="1300" height="820" fill="#f8fafc"/>
  <text x="650" y="50" text-anchor="middle" class="title">Governance, Risk, And Human Gates</text>

  <rect x="100" y="110" width="1100" height="90" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="650" y="148" text-anchor="middle" class="label">Reference Frameworks</text>
  <text x="650" y="176" text-anchor="middle" class="text">NIST AI RMF, ISO/IEC 42001, and EU AI Act anchor the system to recognized governance structures</text>

  <rect x="80" y="270" width="180" height="95" class="box" fill="#ffffff" stroke="#16a34a"/>
  <text x="170" y="308" text-anchor="middle" class="label">Tier 0</text>
  <text x="170" y="336" text-anchor="middle" class="text">observe only</text>

  <rect x="290" y="270" width="180" height="95" class="box" fill="#ffffff" stroke="#16a34a"/>
  <text x="380" y="308" text-anchor="middle" class="label">Tier 1</text>
  <text x="380" y="336" text-anchor="middle" class="text">recommend only</text>

  <rect x="500" y="270" width="180" height="95" class="box" fill="#ffffff" stroke="#d97706"/>
  <text x="590" y="308" text-anchor="middle" class="label">Tier 2</text>
  <text x="590" y="336" text-anchor="middle" class="text">draft, human approves send</text>

  <rect x="710" y="270" width="180" height="95" class="box" fill="#ffffff" stroke="#d97706"/>
  <text x="800" y="308" text-anchor="middle" class="label">Tier 3</text>
  <text x="800" y="336" text-anchor="middle" class="text">reversible low-risk execution</text>

  <rect x="920" y="270" width="180" height="95" class="box" fill="#ffffff" stroke="#dc2626"/>
  <text x="1010" y="308" text-anchor="middle" class="label">Tier 4</text>
  <text x="1010" y="336" text-anchor="middle" class="text">execution with human gates</text>

  <rect x="1130" y="270" width="110" height="95" class="box" fill="#ffffff" stroke="#dc2626"/>
  <text x="1185" y="308" text-anchor="middle" class="label">Tier 5</text>
  <text x="1185" y="336" text-anchor="middle" class="text">restricted</text>

  <rect x="190" y="470" width="920" height="230" class="box" fill="#ffffff" stroke="#7c3aed"/>
  <text x="650" y="512" text-anchor="middle" class="label">Required Governance Artifacts</text>
  <text x="650" y="544" text-anchor="middle" class="text">AI inventory, use-case risk tiering, human-approval policy, audit logs, incident-response plan</text>
  <text x="650" y="572" text-anchor="middle" class="text">rollback plans, data-retention policy, vendor/model register, tool-permission register</text>
  <text x="650" y="600" text-anchor="middle" class="text">assurance cases, model cards</text>
  <text x="650" y="642" text-anchor="middle" class="text">The point is not to slow the system down. The point is to ensure every gain in autonomy has evidence, boundaries, and accountable oversight.</text>
</svg>
