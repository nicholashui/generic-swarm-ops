<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="500" fill="#ffffff"/>
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Hybrid Memory Types (shipped)</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#64748b">Scoped stores · provenance on high-impact writes · lessons from auto-reflect</text>

  <g font-size="12">
    <!-- row 1 — taller boxes, wider gaps -->
    <rect x="30" y="80" width="210" height="78" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="135" y="112" text-anchor="middle" font-weight="700" fill="#1e3a8a">Event</text>
    <text x="135" y="134" text-anchor="middle" fill="#1e40af" font-size="11">raw operational logs</text>

    <rect x="260" y="80" width="210" height="78" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="365" y="112" text-anchor="middle" font-weight="700" fill="#14532d">Episodic</text>
    <text x="365" y="134" text-anchor="middle" fill="#166534" font-size="11">case narratives</text>

    <rect x="490" y="80" width="210" height="78" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
    <text x="595" y="112" text-anchor="middle" font-weight="700" fill="#713f12">Semantic</text>
    <text x="595" y="134" text-anchor="middle" fill="#854d0e" font-size="11">facts / rules</text>

    <rect x="720" y="80" width="210" height="78" rx="8" fill="#fae8ff" stroke="#a21caf"/>
    <text x="825" y="112" text-anchor="middle" font-weight="700" fill="#701a75">Procedural</text>
    <text x="825" y="134" text-anchor="middle" fill="#86198f" font-size="11">skills / workflows</text>

    <!-- row 2 -->
    <rect x="30" y="180" width="210" height="78" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
    <text x="135" y="212" text-anchor="middle" font-weight="700" fill="#312e81">Decision</text>
    <text x="135" y="234" text-anchor="middle" fill="#3730a3" font-size="11">decisions + reasons</text>

    <rect x="260" y="180" width="210" height="78" rx="8" fill="#ffedd5" stroke="#ea580c"/>
    <text x="365" y="212" text-anchor="middle" font-weight="700" fill="#7c2d12">Exception</text>
    <text x="365" y="234" text-anchor="middle" fill="#9a3412" font-size="11">edge cases</text>

    <rect x="490" y="180" width="210" height="78" rx="8" fill="#fee2e2" stroke="#dc2626"/>
    <text x="595" y="212" text-anchor="middle" font-weight="700" fill="#7f1d1d">Evaluation</text>
    <text x="595" y="234" text-anchor="middle" fill="#991b1b" font-size="11">test results</text>

    <rect x="720" y="180" width="210" height="78" rx="8" fill="#f1f5f9" stroke="#475569"/>
    <text x="825" y="212" text-anchor="middle" font-weight="700" fill="#0f172a">Provenance</text>
    <text x="825" y="234" text-anchor="middle" fill="#334155" font-size="11">source attribution</text>
  </g>

  <rect x="30" y="290" width="900" height="72" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="480" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">Lesson library (self-improvement)</text>
  <text x="480" y="344" text-anchor="middle" font-size="12" fill="#5b21b6">auto-reflect on terminal runs · utility-scored lessons · feeds sandbox propose</text>

  <rect x="30" y="384" width="900" height="80" rx="8" fill="#fafafa" stroke="#cbd5e1"/>
  <text x="480" y="414" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Every memory lookup is scoped</text>
  <text x="480" y="438" text-anchor="middle" font-size="12" fill="#475569">organization · user · agent · workflow · department · sensitivity · expiration · policy</text>
  <text x="480" y="458" text-anchor="middle" font-size="11" fill="#64748b">High-impact writes require provenance (memory-poisoning defense)</text>
</svg>
