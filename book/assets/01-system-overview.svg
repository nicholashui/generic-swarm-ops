<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="620" fill="#ffffff"/>
  <text x="480" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Generic Swarm Business Operating System</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#64748b">Safety &#8594; Auditability &#8594; Correctness &#8594; Efficiency &#8594; Autonomy &#183; Product bar ~100</text>

  <rect x="350" y="78" width="260" height="48" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="480" y="107" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1b4b">Intake + Risk Router</text>

  <rect x="330" y="148" width="300" height="56" rx="8" fill="#c7d2fe" stroke="#4f46e5"/>
  <text x="480" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="#1e1b4b">Business Orchestrator</text>
  <text x="480" y="192" text-anchor="middle" font-size="11" fill="#3730a3">state-graph &#183; adapters &#183; Postgres control plane</text>

  <!-- six layers with more width / gap to avoid overlap -->
  <g font-size="12" font-weight="600" fill="#0f172a">
    <rect x="28"  y="236" width="155" height="78" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="105" y="268" text-anchor="middle">Process</text>
    <text x="105" y="286" text-anchor="middle">Intelligence</text>
    <text x="105" y="302" text-anchor="middle" font-size="10" font-weight="500" fill="#166534">artifacts on ingest</text>

    <rect x="198" y="236" width="155" height="78" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="275" y="268" text-anchor="middle">Knowledge</text>
    <text x="275" y="286" text-anchor="middle">+ Memory</text>
    <text x="275" y="302" text-anchor="middle" font-size="10" font-weight="500" fill="#1d4ed8">Tier 0/1 + K1-lite</text>

    <rect x="368" y="236" width="224" height="78" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
    <text x="480" y="268" text-anchor="middle">Execution</text>
    <text x="480" y="286" text-anchor="middle">Workflows</text>
    <text x="480" y="302" text-anchor="middle" font-size="10" font-weight="500" fill="#854d0e">tool_effects + gates</text>

    <rect x="607" y="236" width="155" height="78" rx="8" fill="#fae8ff" stroke="#a21caf"/>
    <text x="684" y="268" text-anchor="middle">Governance</text>
    <text x="684" y="286" text-anchor="middle">Officer</text>
    <text x="684" y="302" text-anchor="middle" font-size="10" font-weight="500" fill="#86198f">risk tiers</text>

    <rect x="777" y="236" width="155" height="78" rx="8" fill="#fee2e2" stroke="#dc2626"/>
    <text x="854" y="268" text-anchor="middle">Security</text>
    <text x="854" y="286" text-anchor="middle">Red-Team</text>
    <text x="854" y="302" text-anchor="middle" font-size="10" font-weight="500" fill="#991b1b">allow-lists</text>
  </g>

  <rect x="300" y="350" width="360" height="44" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="480" y="377" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Audit Log + Memory Write + tool_effects</text>

  <rect x="300" y="412" width="360" height="44" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="480" y="439" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Evaluation + Human Review (block_on_fail)</text>

  <rect x="240" y="474" width="480" height="56" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="480" y="498" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">Evolution + Self-Improvement Sandbox</text>
  <text x="480" y="518" text-anchor="middle" font-size="11" fill="#5b21b6">reflect &#8594; propose &#8594; evaluate &#8594; canary (never mutate production DNA)</text>

  <rect x="240" y="548" width="480" height="40" rx="8" fill="#ecfdf5" stroke="#059669"/>
  <text x="480" y="573" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">Postgres runtime_state &#183; Trae + Grok dual-harness &#183; Next.js ops console</text>

  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arr)">
    <line x1="480" y1="126" x2="480" y2="146"/>
    <line x1="480" y1="204" x2="480" y2="232"/>
    <line x1="480" y1="316" x2="480" y2="348"/>
    <line x1="480" y1="394" x2="480" y2="410"/>
    <line x1="480" y1="456" x2="480" y2="472"/>
    <line x1="480" y1="530" x2="480" y2="546"/>
  </g>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
