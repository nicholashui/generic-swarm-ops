<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 14px Arial, sans-serif; fill: #64748b; }
      .label { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .text { font: 13px Arial, sans-serif; fill: #334155; }
      .box { rx: 16; ry: 16; stroke-width: 2.5; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#head); }
    </style>
    <marker id="head" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1400" height="780" fill="#f8fafc"/>
  <text x="700" y="48" text-anchor="middle" class="title">Sandbox Evolution + Self-Improvement</text>
  <text x="700" y="76" text-anchor="middle" class="subtitle">Never mutate production DNA directly · auto_promote forbidden</text>

  <!-- row 1 -->
  <rect x="50" y="120" width="200" height="100" class="box" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="150" y="162" text-anchor="middle" class="label">1. Reflect</text>
  <text x="150" y="190" text-anchor="middle" class="text">lessons from runs</text>

  <rect x="290" y="120" width="200" height="100" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="390" y="162" text-anchor="middle" class="label">2. Propose</text>
  <text x="390" y="190" text-anchor="middle" class="text">sandbox_only DNA</text>

  <rect x="530" y="120" width="200" height="100" class="box" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="630" y="162" text-anchor="middle" class="label">3. Evaluate</text>
  <text x="630" y="190" text-anchor="middle" class="text">disk corpus fitness</text>

  <rect x="770" y="120" width="200" height="100" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="870" y="162" text-anchor="middle" class="label">4. Canary</text>
  <text x="870" y="190" text-anchor="middle" class="text">approved_for_canary</text>

  <rect x="1010" y="120" width="200" height="100" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="1110" y="162" text-anchor="middle" class="label">5. Rollback</text>
  <text x="1110" y="190" text-anchor="middle" class="text">restore prior version</text>

  <line x1="250" y1="170" x2="288" y2="170" class="arrow"/>
  <line x1="490" y1="170" x2="528" y2="170" class="arrow"/>
  <line x1="730" y1="170" x2="768" y2="170" class="arrow"/>
  <line x1="970" y1="170" x2="1008" y2="170" class="arrow"/>

  <!-- middle -->
  <rect x="150" y="300" width="280" height="100" class="box" fill="#ffffff" stroke="#7c3aed"/>
  <text x="290" y="342" text-anchor="middle" class="label">Human Review</text>
  <text x="290" y="370" text-anchor="middle" class="text">when risk tier requires</text>

  <rect x="500" y="300" width="280" height="100" class="box" fill="#ffffff" stroke="#0284c7"/>
  <text x="640" y="342" text-anchor="middle" class="label">Versioned Promote</text>
  <text x="640" y="370" text-anchor="middle" class="text">explicit operator action only</text>

  <rect x="850" y="300" width="280" height="100" class="box" fill="#ffffff" stroke="#16a34a"/>
  <text x="990" y="342" text-anchor="middle" class="label">Population Archive</text>
  <text x="990" y="370" text-anchor="middle" class="text">GET /evolution/archive · FE UI</text>

  <!-- bottom -->
  <rect x="120" y="460" width="1160" height="120" class="box" fill="#f1f5f9" stroke="#475569"/>
  <text x="700" y="510" text-anchor="middle" class="label">Corpus: golden ≥20 · regression · adversarial · historical-replay</text>
  <text x="700" y="544" text-anchor="middle" class="text">business/evals/* · fitness metrics · skill sandbox under distilled/skills/_sandbox/</text>

  <rect x="120" y="620" width="1160" height="100" class="box" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="700" y="665" text-anchor="middle" class="label">FE Improve pipeline on run detail</text>
  <text x="700" y="696" text-anchor="middle" class="text">Reflect → Propose → Evaluate → Canary  ·  or full pipeline in one click</text>
</svg>
