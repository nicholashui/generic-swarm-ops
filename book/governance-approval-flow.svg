<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .text { font: 15px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#head); }
      .box { rx: 18; ry: 18; stroke-width: 2.5; }
    </style>
    <marker id="head" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#f8fafc"/>
  <text x="600" y="52" text-anchor="middle" class="title">Governance And Approval Decision Flow</text>

  <rect x="70" y="130" width="180" height="80" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="160" y="176" text-anchor="middle" class="label">Action Requested</text>

  <rect x="320" y="130" width="220" height="80" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="430" y="164" text-anchor="middle" class="label">Check Identity And Scope</text>
  <text x="430" y="188" text-anchor="middle" class="text">user, org, role, department</text>

  <rect x="610" y="130" width="250" height="80" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="735" y="164" text-anchor="middle" class="label">Evaluate Governance Policy</text>
  <text x="735" y="188" text-anchor="middle" class="text">risk, tool, data, workflow, rules</text>

  <rect x="930" y="130" width="180" height="80" class="box" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="1020" y="176" text-anchor="middle" class="label">Decision</text>

  <line x1="250" y1="170" x2="320" y2="170" class="arrow"/>
  <line x1="540" y1="170" x2="610" y2="170" class="arrow"/>
  <line x1="860" y1="170" x2="930" y2="170" class="arrow"/>

  <rect x="120" y="320" width="220" height="100" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="230" y="362" text-anchor="middle" class="label">Allow</text>
  <text x="230" y="388" text-anchor="middle" class="text">Continue to workflow or tool execution</text>

  <rect x="420" y="320" width="220" height="100" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="530" y="362" text-anchor="middle" class="label">Deny</text>
  <text x="530" y="388" text-anchor="middle" class="text">Return controlled error and write audit log</text>

  <rect x="720" y="300" width="240" height="140" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="840" y="340" text-anchor="middle" class="label">Require Approval</text>
  <text x="840" y="366" text-anchor="middle" class="text">Create approval request</text>
  <text x="840" y="392" text-anchor="middle" class="text">Pause run at waiting_for_approval</text>
  <text x="840" y="418" text-anchor="middle" class="text">Assign reviewer</text>

  <line x1="1020" y1="210" x2="230" y2="320" class="arrow"/>
  <line x1="1020" y1="210" x2="530" y2="320" class="arrow"/>
  <line x1="1020" y1="210" x2="840" y2="300" class="arrow"/>

  <rect x="740" y="520" width="190" height="80" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="835" y="567" text-anchor="middle" class="label">Approved</text>

  <rect x="960" y="520" width="190" height="80" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="1055" y="567" text-anchor="middle" class="label">Rejected</text>

  <line x1="840" y1="440" x2="835" y2="520" class="arrow"/>
  <line x1="930" y1="440" x2="1055" y2="520" class="arrow"/>

  <line x1="835" y1="600" x2="230" y2="600" class="arrow"/>
  <text x="470" y="585" class="text">resume step or workflow</text>
  <line x1="230" y1="600" x2="230" y2="420" class="arrow"/>

  <line x1="1055" y1="600" x2="530" y2="600" class="arrow"/>
  <text x="760" y="585" class="text">stop, fail, or cancel according to policy</text>
  <line x1="530" y1="600" x2="530" y2="420" class="arrow"/>

  <rect x="80" y="650" width="1040" height="70" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="100" y="692" class="text">Governance outputs from the spec: allow, deny, require_approval, require_evaluation, require_redaction. Approval is only one of several control paths.</text>
</svg>
