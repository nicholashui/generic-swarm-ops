<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 750" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="750" fill="#ffffff"/>
  <text x="480" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Diagnostic Tools Overview</text>
  <text x="480" y="58" text-anchor="middle" font-size="12" fill="#64748b">All diagnostic commands organized by layer with outputs and checks</text>

  <!-- Layer 1: Starter Layer -->
  <rect x="30" y="80" width="900" height="130" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="60" y="105" font-size="14" font-weight="700" fill="#1e1b4b">Starter Layer</text>

  <rect x="50" y="115" width="250" height="80" rx="8" fill="#ffffff" stroke="#6366f1"/>
  <text x="175" y="138" text-anchor="middle" font-size="12" font-weight="600" fill="#1e1b4b">npm run doctor</text>
  <text x="65" y="158" font-size="10" fill="#475569">Checks: Node.js, Git, Python,</text>
  <text x="65" y="172" font-size="10" fill="#475569">PostgreSQL, pnpm versions</text>
  <text x="65" y="186" font-size="10" fill="#16a34a">Output: Pass/fail per prereq</text>

  <rect x="320" y="115" width="280" height="80" rx="8" fill="#ffffff" stroke="#6366f1"/>
  <text x="460" y="138" text-anchor="middle" font-size="12" font-weight="600" fill="#1e1b4b">npm run sources:download</text>
  <text x="335" y="158" font-size="10" fill="#475569">Checks: External repo availability</text>
  <text x="335" y="172" font-size="10" fill="#475569">Writes: sources/source-lock.json</text>
  <text x="335" y="186" font-size="10" fill="#16a34a">Output: Clone status per source</text>

  <rect x="620" y="115" width="290" height="80" rx="8" fill="#ffffff" stroke="#6366f1"/>
  <text x="765" y="138" text-anchor="middle" font-size="12" font-weight="600" fill="#1e1b4b">npm run sources:audit</text>
  <text x="635" y="158" font-size="10" fill="#475569">Checks: Source integrity, licensing</text>
  <text x="635" y="172" font-size="10" fill="#475569">Writes: docs/source-audit.md</text>
  <text x="635" y="186" font-size="10" fill="#16a34a">Output: Audit warnings report</text>

  <!-- Layer 2: Business Layer -->
  <rect x="30" y="230" width="900" height="190" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="60" y="255" font-size="14" font-weight="700" fill="#166534">Business Layer</text>

  <rect x="50" y="268" width="270" height="66" rx="8" fill="#ffffff" stroke="#16a34a"/>
  <text x="185" y="291" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">npm run business:validate</text>
  <text x="65" y="309" font-size="10" fill="#475569">Schema, provenance, risk-tier, gate checks</text>
  <text x="65" y="323" font-size="10" fill="#16a34a">Output: Validation pass/fail per rule</text>

  <rect x="340" y="268" width="270" height="66" rx="8" fill="#ffffff" stroke="#16a34a"/>
  <text x="475" y="291" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">npm run business:security</text>
  <text x="355" y="309" font-size="10" fill="#475569">Secrets, permissions, prompt-injection scans</text>
  <text x="355" y="323" font-size="10" fill="#16a34a">Output: Security findings report</text>

  <rect x="630" y="268" width="280" height="66" rx="8" fill="#ffffff" stroke="#16a34a"/>
  <text x="770" y="291" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">npm run business:governance</text>
  <text x="645" y="309" font-size="10" fill="#475569">Model card, assurance case validation</text>
  <text x="645" y="323" font-size="10" fill="#16a34a">Output: Governance compliance status</text>

  <rect x="50" y="348" width="270" height="60" rx="8" fill="#ffffff" stroke="#16a34a"/>
  <text x="185" y="371" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">npm run business:evolution:check</text>
  <text x="65" y="389" font-size="10" fill="#475569">Promotion evidence completeness</text>
  <text x="65" y="403" font-size="10" fill="#16a34a">Output: Evidence gaps report</text>

  <rect x="340" y="348" width="270" height="60" rx="8" fill="#ffffff" stroke="#16a34a"/>
  <text x="475" y="371" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">npm run business:eval</text>
  <text x="355" y="389" font-size="10" fill="#475569">Golden task evaluation corpus run</text>
  <text x="355" y="403" font-size="10" fill="#16a34a">Output: Eval scores + regression check</text>

  <rect x="630" y="348" width="280" height="60" rx="8" fill="#ffffff" stroke="#16a34a"/>
  <text x="770" y="371" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">npm run business:init</text>
  <text x="645" y="389" font-size="10" fill="#475569">Seeds missing business artifacts</text>
  <text x="645" y="403" font-size="10" fill="#16a34a">Output: Created file listing</text>

  <!-- Layer 3: Backend -->
  <rect x="30" y="440" width="440" height="130" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="60" y="465" font-size="14" font-weight="700" fill="#854d0e">Backend Layer</text>

  <rect x="50" y="478" width="200" height="78" rx="8" fill="#ffffff" stroke="#ca8a04"/>
  <text x="150" y="498" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e">Unit Tests</text>
  <text x="65" y="516" font-size="9" fill="#475569">python -m unittest</text>
  <text x="65" y="530" font-size="9" fill="#475569">discover -s app/tests/unit</text>
  <text x="65" y="544" font-size="9" fill="#16a34a">Output: Test pass/fail</text>

  <rect x="262" y="478" width="192" height="78" rx="8" fill="#ffffff" stroke="#ca8a04"/>
  <text x="358" y="498" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e">E2E Tests</text>
  <text x="275" y="516" font-size="9" fill="#475569">python -m unittest</text>
  <text x="275" y="530" font-size="9" fill="#475569">discover -s app/tests/e2e</text>
  <text x="275" y="544" font-size="9" fill="#16a34a">Output: Integration results</text>

  <!-- Layer 4: Frontend -->
  <rect x="490" y="440" width="440" height="130" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="520" y="465" font-size="14" font-weight="700" fill="#1d4ed8">Frontend Layer</text>

  <rect x="510" y="478" width="130" height="78" rx="8" fill="#ffffff" stroke="#2563eb"/>
  <text x="575" y="498" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">pnpm lint</text>
  <text x="522" y="516" font-size="9" fill="#475569">ESLint checks</text>
  <text x="522" y="530" font-size="9" fill="#475569">Code quality</text>
  <text x="522" y="544" font-size="9" fill="#16a34a">Output: Lint errors</text>

  <rect x="650" y="478" width="130" height="78" rx="8" fill="#ffffff" stroke="#2563eb"/>
  <text x="715" y="498" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">pnpm typecheck</text>
  <text x="662" y="516" font-size="9" fill="#475569">TypeScript strict</text>
  <text x="662" y="530" font-size="9" fill="#475569">Type safety</text>
  <text x="662" y="544" font-size="9" fill="#16a34a">Output: Type errors</text>

  <rect x="790" y="478" width="130" height="78" rx="8" fill="#ffffff" stroke="#2563eb"/>
  <text x="855" y="498" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">pnpm test</text>
  <text x="802" y="516" font-size="9" fill="#475569">Vitest / Jest</text>
  <text x="802" y="530" font-size="9" fill="#475569">Component tests</text>
  <text x="802" y="544" font-size="9" fill="#16a34a">Output: Test results</text>

  <!-- Aggregate output -->
  <rect x="200" y="600" width="560" height="56" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
  <text x="480" y="624" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Combined Diagnostic Report</text>
  <text x="480" y="644" text-anchor="middle" font-size="11" fill="#475569">All tools feed into a holistic system health picture</text>

  <!-- Arrows to aggregate -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <g stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <line x1="250" y1="570" x2="350" y2="600"/>
    <line x1="480" y1="570" x2="480" y2="600"/>
    <line x1="710" y1="570" x2="610" y2="600"/>
  </g>

  <!-- Legend -->
  <rect x="30" y="690" width="900" height="44" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="55" y="705" width="16" height="16" rx="4" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="80" y="717" font-size="10" fill="#334155">Starter</text>
  <rect x="135" y="705" width="16" height="16" rx="4" fill="#dcfce7" stroke="#16a34a"/>
  <text x="160" y="717" font-size="10" fill="#334155">Business</text>
  <rect x="225" y="705" width="16" height="16" rx="4" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="250" y="717" font-size="10" fill="#334155">Backend</text>
  <rect x="310" y="705" width="16" height="16" rx="4" fill="#dbeafe" stroke="#2563eb"/>
  <text x="335" y="717" font-size="10" fill="#334155">Frontend</text>
</svg>
