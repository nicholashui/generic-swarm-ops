<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="600" fill="#ffffff"/>
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Configuration Layers Overview</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">Environment Variables &#8594; Backend .env &#8594; Frontend env &#8594; Business Artifacts</text>

  <!-- System Environment -->
  <rect x="40" y="84" width="410" height="120" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="245" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e1b4b">System Environment Variables</text>
  <g font-size="11" fill="#3730a3">
    <text x="60" y="136">GENERIC_SWARM_AUTO_REFLECT=true</text>
    <text x="60" y="156">GENERIC_SWARM_LLM_CRITIC_ENABLED=false</text>
    <text x="60" y="176">GENERIC_SWARM_EMBEDDINGS_ENABLED=false</text>
    <text x="60" y="196">GENERIC_SWARM_PGVECTOR_ENABLED=false</text>
  </g>

  <!-- Backend .env -->
  <rect x="500" y="84" width="420" height="120" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="710" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">Backend .env (backend/.env)</text>
  <g font-size="11" fill="#166534">
    <text x="520" y="136">DATABASE_URL=postgresql://...</text>
    <text x="520" y="156">PYTHONPATH=.</text>
    <text x="520" y="176">NEO4J_URI= (optional)</text>
    <text x="520" y="196">SECRET_KEY=... (auth tokens)</text>
  </g>

  <!-- Frontend env -->
  <rect x="40" y="234" width="410" height="100" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="245" y="260" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Frontend Environment</text>
  <g font-size="11" fill="#1d4ed8">
    <text x="60" y="286">NEXT_PUBLIC_DEMO_MODE=false</text>
    <text x="60" y="306">NEXT_PUBLIC_API_BASE_URL=http://127.0.0.1:8000/api/v1</text>
    <text x="60" y="326">Ops profile: live API connection</text>
  </g>

  <!-- Business Artifacts -->
  <rect x="500" y="234" width="420" height="100" rx="8" fill="#fae8ff" stroke="#a21caf"/>
  <text x="710" y="260" text-anchor="middle" font-size="14" font-weight="700" fill="#701a75">Business Artifacts (business/)</text>
  <g font-size="11" fill="#86198f">
    <text x="520" y="286">governance/ - risk tiers, approval policy</text>
    <text x="520" y="306">evals/ - golden tasks, regression tests</text>
    <text x="520" y="326">evolution/ - workflow DNA variants</text>
  </g>

  <!-- Validation layer -->
  <rect x="200" y="370" width="560" height="80" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="480" y="396" text-anchor="middle" font-size="14" font-weight="700" fill="#713f12">Validation Commands</text>
  <g font-size="11" fill="#854d0e">
    <text x="220" y="420">npm run business:validate</text>
    <text x="220" y="440">npm run business:governance</text>
    <text x="520" y="420">npm run business:security</text>
    <text x="520" y="440">npm run business:evolution:check</text>
  </g>

  <!-- Auth Configuration -->
  <rect x="200" y="480" width="560" height="80" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="480" y="506" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">Authentication Configuration</text>
  <g font-size="11" fill="#991b1b">
    <text x="220" y="530">Seed login: admin@example.com / admin-password</text>
    <text x="220" y="550">Cookie: gso_access_token &#183; Session: user cookie &#183; RBAC roles</text>
  </g>

  <!-- Arrows showing flow -->
  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arr)">
    <line x1="245" y1="204" x2="245" y2="232"/>
    <line x1="710" y1="204" x2="710" y2="232"/>
    <line x1="480" y1="340" x2="480" y2="368"/>
    <line x1="480" y1="450" x2="480" y2="478"/>
  </g>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
