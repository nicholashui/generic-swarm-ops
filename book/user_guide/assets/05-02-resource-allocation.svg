<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="680" fill="#ffffff"/>
  <text x="480" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Resource Allocation &amp; Budget Management</text>
  <text x="480" y="58" text-anchor="middle" font-size="12" fill="#64748b">Eval corpus &#183; Memory retention &#183; Evolution sandbox &#183; Loop Engineering budgets</text>

  <!-- Evaluation Corpus Budget -->
  <rect x="40" y="90" width="420" height="140" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="250" y="115" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1b4b">Evaluation Corpus Budget</text>
  <rect x="60" y="130" width="180" height="36" rx="6" fill="#ffffff" stroke="#6366f1"/>
  <text x="150" y="153" text-anchor="middle" font-size="11" fill="#1e1b4b">Golden Tasks (20+)</text>
  <rect x="260" y="130" width="180" height="36" rx="6" fill="#ffffff" stroke="#6366f1"/>
  <text x="350" y="153" text-anchor="middle" font-size="11" fill="#1e1b4b">Regression Tests</text>
  <rect x="60" y="178" width="180" height="36" rx="6" fill="#ffffff" stroke="#6366f1"/>
  <text x="150" y="201" text-anchor="middle" font-size="11" fill="#1e1b4b">Adversarial Tests</text>
  <rect x="260" y="178" width="180" height="36" rx="6" fill="#ffffff" stroke="#6366f1"/>
  <text x="350" y="201" text-anchor="middle" font-size="11" fill="#1e1b4b">Historical Replay</text>

  <!-- Memory Retention Tiers -->
  <rect x="500" y="90" width="420" height="140" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="710" y="115" text-anchor="middle" font-size="14" font-weight="600" fill="#1d4ed8">Memory Retention Tiers</text>
  <rect x="520" y="130" width="120" height="36" rx="6" fill="#ffffff" stroke="#2563eb"/>
  <text x="580" y="153" text-anchor="middle" font-size="11" fill="#1d4ed8">Event (7d)</text>
  <rect x="655" y="130" width="120" height="36" rx="6" fill="#ffffff" stroke="#2563eb"/>
  <text x="715" y="153" text-anchor="middle" font-size="11" fill="#1d4ed8">Episodic (30d)</text>
  <rect x="790" y="130" width="120" height="36" rx="6" fill="#ffffff" stroke="#2563eb"/>
  <text x="850" y="153" text-anchor="middle" font-size="11" fill="#1d4ed8">Semantic (perm)</text>
  <rect x="520" y="178" width="120" height="36" rx="6" fill="#ffffff" stroke="#2563eb"/>
  <text x="580" y="201" text-anchor="middle" font-size="11" fill="#1d4ed8">Decision (90d)</text>
  <rect x="655" y="178" width="120" height="36" rx="6" fill="#ffffff" stroke="#2563eb"/>
  <text x="715" y="201" text-anchor="middle" font-size="11" fill="#1d4ed8">Evaluation (60d)</text>
  <rect x="790" y="178" width="120" height="36" rx="6" fill="#ffffff" stroke="#2563eb"/>
  <text x="850" y="201" text-anchor="middle" font-size="11" fill="#1d4ed8">Provenance (perm)</text>

  <!-- Evolution Sandbox Limits -->
  <rect x="40" y="260" width="420" height="160" rx="8" fill="#fae8ff" stroke="#a21caf"/>
  <text x="250" y="285" text-anchor="middle" font-size="14" font-weight="600" fill="#86198f">Evolution Sandbox Limits</text>
  <rect x="60" y="300" width="380" height="30" rx="6" fill="#ffffff" stroke="#a21caf"/>
  <text x="250" y="320" text-anchor="middle" font-size="11" fill="#86198f">Max Variants per Generation: 5 (default)</text>
  <rect x="60" y="340" width="380" height="30" rx="6" fill="#ffffff" stroke="#a21caf"/>
  <text x="250" y="360" text-anchor="middle" font-size="11" fill="#86198f">Evaluation Budget: corpus_size x variant_count</text>
  <rect x="60" y="380" width="380" height="30" rx="6" fill="#ffffff" stroke="#a21caf"/>
  <text x="250" y="400" text-anchor="middle" font-size="11" fill="#86198f">Canary Scope: 5-10% production traffic</text>

  <!-- Loop Engineering Budget -->
  <rect x="500" y="260" width="420" height="160" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="710" y="285" text-anchor="middle" font-size="14" font-weight="600" fill="#166534">Loop Engineering Budget</text>
  <rect x="520" y="300" width="380" height="30" rx="6" fill="#ffffff" stroke="#16a34a"/>
  <text x="710" y="320" text-anchor="middle" font-size="11" fill="#166534">max_iterations: 10 (configurable)</text>
  <rect x="520" y="340" width="380" height="30" rx="6" fill="#ffffff" stroke="#16a34a"/>
  <text x="710" y="360" text-anchor="middle" font-size="11" fill="#166534">fail_budget: 3 (stop after N failures)</text>
  <rect x="520" y="380" width="380" height="30" rx="6" fill="#ffffff" stroke="#16a34a"/>
  <text x="710" y="400" text-anchor="middle" font-size="11" fill="#166534">Stopping: success | max_iter | fail_budget | escalate</text>

  <!-- Tool Concurrency Pools -->
  <rect x="40" y="450" width="420" height="100" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="250" y="475" text-anchor="middle" font-size="14" font-weight="600" fill="#854d0e">Tool Adapter Concurrency</text>
  <rect x="60" y="490" width="180" height="44" rx="6" fill="#ffffff" stroke="#ca8a04"/>
  <text x="150" y="509" text-anchor="middle" font-size="10" fill="#854d0e">CRM Pool: 5 concurrent</text>
  <text x="150" y="525" text-anchor="middle" font-size="10" fill="#854d0e">Rate: 100 req/min</text>
  <rect x="260" y="490" width="180" height="44" rx="6" fill="#ffffff" stroke="#ca8a04"/>
  <text x="350" y="509" text-anchor="middle" font-size="10" fill="#854d0e">Email Pool: 3 concurrent</text>
  <text x="350" y="525" text-anchor="middle" font-size="10" fill="#854d0e">Rate: 50 req/min</text>

  <!-- Cost Optimization -->
  <rect x="500" y="450" width="420" height="100" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="710" y="475" text-anchor="middle" font-size="14" font-weight="600" fill="#991b1b">Cost-per-Case Optimization</text>
  <rect x="520" y="490" width="380" height="44" rx="6" fill="#ffffff" stroke="#dc2626"/>
  <text x="710" y="509" text-anchor="middle" font-size="10" fill="#991b1b">Target: $0.42/case (eval benchmark)</text>
  <text x="710" y="525" text-anchor="middle" font-size="10" fill="#991b1b">Levers: tier escalation, model selection, caching</text>

  <!-- Fitness Composite -->
  <rect x="200" y="585" width="560" height="70" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="480" y="612" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Fitness Composite (Deterministic)</text>
  <text x="480" y="636" text-anchor="middle" font-size="12" fill="#475569">0.6 * suite_pass_rate + 0.2 * knowledge_growth_norm + 0.2 * lesson_reuse_norm</text>

  <!-- Arrows -->
  <g stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <line x1="250" y1="230" x2="250" y2="258"/>
    <line x1="710" y1="230" x2="710" y2="258"/>
    <line x1="250" y1="420" x2="250" y2="448"/>
    <line x1="710" y1="420" x2="710" y2="448"/>
    <line x1="250" y1="550" x2="400" y2="583"/>
    <line x1="710" y1="550" x2="560" y2="583"/>
  </g>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
