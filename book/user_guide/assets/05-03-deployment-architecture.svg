<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 750" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="750" fill="#ffffff"/>
  <text x="480" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Large-Scale Deployment Architecture</text>
  <text x="480" y="58" text-anchor="middle" font-size="12" fill="#64748b">Horizontal scaling &#183; Domain isolation &#183; Federated knowledge &#183; CI/CD</text>

  <!-- Load Balancer -->
  <rect x="340" y="80" width="280" height="44" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="480" y="107" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Load Balancer / Reverse Proxy</text>

  <!-- Backend Instances -->
  <rect x="80" y="155" width="800" height="90" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="480" y="178" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1b4b">FastAPI Backend Cluster</text>
  <rect x="110" y="192" width="150" height="40" rx="6" fill="#ffffff" stroke="#6366f1"/>
  <text x="185" y="216" text-anchor="middle" font-size="11" fill="#1e1b4b">Instance 1 (uvicorn)</text>
  <rect x="290" y="192" width="150" height="40" rx="6" fill="#ffffff" stroke="#6366f1"/>
  <text x="365" y="216" text-anchor="middle" font-size="11" fill="#1e1b4b">Instance 2 (uvicorn)</text>
  <rect x="470" y="192" width="150" height="40" rx="6" fill="#ffffff" stroke="#6366f1"/>
  <text x="545" y="216" text-anchor="middle" font-size="11" fill="#1e1b4b">Instance 3 (uvicorn)</text>
  <rect x="650" y="192" width="150" height="40" rx="6" fill="#ffffff" stroke="#6366f1"/>
  <text x="725" y="216" text-anchor="middle" font-size="11" fill="#1e1b4b">Instance N (uvicorn)</text>

  <!-- Database Cluster -->
  <rect x="80" y="275" width="380" height="100" rx="8" fill="#fae8ff" stroke="#a21caf"/>
  <text x="270" y="300" text-anchor="middle" font-size="14" font-weight="600" fill="#86198f">PostgreSQL Cluster</text>
  <rect x="100" y="312" width="150" height="50" rx="6" fill="#ffffff" stroke="#a21caf"/>
  <text x="175" y="335" text-anchor="middle" font-size="11" fill="#86198f">Primary (R/W)</text>
  <text x="175" y="352" text-anchor="middle" font-size="9" fill="#86198f">runtime_state JSONB</text>
  <rect x="270" y="312" width="170" height="50" rx="6" fill="#ffffff" stroke="#a21caf"/>
  <text x="355" y="335" text-anchor="middle" font-size="11" fill="#86198f">Read Replicas (1..N)</text>
  <text x="355" y="352" text-anchor="middle" font-size="9" fill="#86198f">streaming replication</text>

  <!-- Federated Knowledge -->
  <rect x="500" y="275" width="380" height="100" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="690" y="300" text-anchor="middle" font-size="14" font-weight="600" fill="#1d4ed8">Federated Knowledge Graph</text>
  <rect x="520" y="312" width="160" height="50" rx="6" fill="#ffffff" stroke="#2563eb"/>
  <text x="600" y="335" text-anchor="middle" font-size="11" fill="#1d4ed8">K1-lite (internal)</text>
  <text x="600" y="352" text-anchor="middle" font-size="9" fill="#1d4ed8">entity + relations</text>
  <rect x="700" y="312" width="160" height="50" rx="6" fill="#ffffff" stroke="#2563eb"/>
  <text x="780" y="335" text-anchor="middle" font-size="11" fill="#1d4ed8">Neo4j (optional)</text>
  <text x="780" y="352" text-anchor="middle" font-size="9" fill="#1d4ed8">POST /graph/federate</text>

  <!-- Domain Pack Isolation -->
  <rect x="80" y="405" width="800" height="110" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="480" y="430" text-anchor="middle" font-size="14" font-weight="600" fill="#166534">Domain Pack Isolation Layer</text>
  <rect x="110" y="445" width="200" height="55" rx="6" fill="#ffffff" stroke="#16a34a"/>
  <text x="210" y="468" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">video (114 agents)</text>
  <text x="210" y="486" text-anchor="middle" font-size="9" fill="#166534">N3 inventory enforced</text>
  <rect x="340" y="445" width="200" height="55" rx="6" fill="#ffffff" stroke="#16a34a"/>
  <text x="440" y="468" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">example_research</text>
  <text x="440" y="486" text-anchor="middle" font-size="9" fill="#166534">Wave 1 second pack</text>
  <rect x="570" y="445" width="200" height="55" rx="6" fill="#ffffff" stroke="#16a34a"/>
  <text x="670" y="468" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">example_education</text>
  <text x="670" y="486" text-anchor="middle" font-size="9" fill="#166534">Wave 4 lite pack</text>

  <!-- CI/CD Pipeline -->
  <rect x="80" y="545" width="800" height="80" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="480" y="570" text-anchor="middle" font-size="14" font-weight="600" fill="#854d0e">CI/CD Pipeline</text>
  <rect x="110" y="585" width="160" height="30" rx="6" fill="#ffffff" stroke="#ca8a04"/>
  <text x="190" y="605" text-anchor="middle" font-size="10" fill="#854d0e">inventory_check.py</text>
  <rect x="290" y="585" width="160" height="30" rx="6" fill="#ffffff" stroke="#ca8a04"/>
  <text x="370" y="605" text-anchor="middle" font-size="10" fill="#854d0e">business:validate</text>
  <rect x="470" y="585" width="160" height="30" rx="6" fill="#ffffff" stroke="#ca8a04"/>
  <text x="550" y="605" text-anchor="middle" font-size="10" fill="#854d0e">business:security</text>
  <rect x="650" y="585" width="180" height="30" rx="6" fill="#ffffff" stroke="#ca8a04"/>
  <text x="740" y="605" text-anchor="middle" font-size="10" fill="#854d0e">docker build + deploy</text>

  <!-- Environment Management -->
  <rect x="200" y="660" width="560" height="60" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="480" y="685" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">Production Environment Variables</text>
  <text x="480" y="705" text-anchor="middle" font-size="11" fill="#991b1b">DATABASE_URL &#183; NEO4J_URI &#183; GENERIC_SWARM_* &#183; NEXT_PUBLIC_*</text>

  <!-- Arrows -->
  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arr)">
    <line x1="480" y1="124" x2="480" y2="153"/>
    <line x1="270" y1="245" x2="270" y2="273"/>
    <line x1="690" y1="245" x2="690" y2="273"/>
    <line x1="480" y1="375" x2="480" y2="403"/>
    <line x1="480" y1="515" x2="480" y2="543"/>
    <line x1="480" y1="625" x2="480" y2="658"/>
  </g>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
