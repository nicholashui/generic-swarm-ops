<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="560" fill="#ffffff"/>
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Process Intelligence Pipeline</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">Event ingestion &#8594; Storage &#8594; Discovery &#8594; Conformance &#8594; Bottleneck Analysis &#8594; Artifacts</text>

  <!-- Pipeline steps -->
  <rect x="40" y="100" width="150" height="70" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="115" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#312e81">Event Ingestion</text>
  <text x="115" y="148" text-anchor="middle" font-size="10" fill="#3730a3">POST /api/v1/</text>
  <text x="115" y="162" text-anchor="middle" font-size="10" fill="#3730a3">processes/event-logs</text>

  <rect x="220" y="100" width="140" height="70" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="290" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">Storage</text>
  <text x="290" y="148" text-anchor="middle" font-size="10" fill="#1d4ed8">Postgres document</text>
  <text x="290" y="162" text-anchor="middle" font-size="10" fill="#1d4ed8">runtime_state</text>

  <rect x="390" y="100" width="160" height="70" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="470" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">Process Discovery</text>
  <text x="470" y="148" text-anchor="middle" font-size="10" fill="#166534">Process Miner Agent</text>
  <text x="470" y="162" text-anchor="middle" font-size="10" fill="#166534">activity maps</text>

  <rect x="580" y="100" width="160" height="70" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="660" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#713f12">Conformance Check</text>
  <text x="660" y="148" text-anchor="middle" font-size="10" fill="#854d0e">Conformance Agent</text>
  <text x="660" y="162" text-anchor="middle" font-size="10" fill="#854d0e">expected vs observed</text>

  <rect x="770" y="100" width="160" height="70" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="850" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#7f1d1d">Bottleneck Analysis</text>
  <text x="850" y="148" text-anchor="middle" font-size="10" fill="#991b1b">Bottleneck Analyzer</text>
  <text x="850" y="162" text-anchor="middle" font-size="10" fill="#991b1b">delays + loops</text>

  <!-- Event Schema box -->
  <rect x="40" y="210" width="400" height="200" rx="8" fill="#fafafa" stroke="#cbd5e1"/>
  <text x="240" y="238" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Event Log Schema</text>
  <g font-size="11" fill="#334155">
    <text x="60" y="262">id: "evt_..."</text>
    <text x="60" y="280">timestamp: ISO 8601</text>
    <text x="60" y="298">actor_type: human | agent | system</text>
    <text x="60" y="316">process_id: "customer_onboarding"</text>
    <text x="60" y="334">case_id: "customer_12345"</text>
    <text x="60" y="352">activity: "review_contract"</text>
    <text x="60" y="370">tools_used: ["crm", "email"]</text>
    <text x="60" y="388">outcome.status: completed | failed</text>
    <text x="60" y="406">outcome.latency_minutes: 42</text>
  </g>

  <!-- Artifact Output -->
  <rect x="480" y="210" width="440" height="200" rx="8" fill="#fafafa" stroke="#cbd5e1"/>
  <text x="700" y="238" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Artifact Output (business/process-intelligence/)</text>
  <g font-size="11" fill="#334155">
    <text x="500" y="266">discovered-processes/</text>
    <text x="520" y="284" font-size="10" fill="#64748b">Per-process activity maps</text>
    <text x="500" y="308">conformance-reports/</text>
    <text x="520" y="326" font-size="10" fill="#64748b">Expected vs observed activities</text>
    <text x="500" y="350">bottlenecks/</text>
    <text x="520" y="368" font-size="10" fill="#64748b">Approval waits + activity latency</text>
    <text x="500" y="392">event-logs/</text>
    <text x="520" y="410" font-size="10" fill="#64748b">Reference / ops notes</text>
  </g>

  <!-- PI Agents row -->
  <rect x="80" y="440" width="800" height="80" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="480" y="466" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">Process Intelligence Agents</text>
  <g font-size="11" fill="#5b21b6">
    <text x="120" y="490">Process Miner</text>
    <text x="280" y="490">Task Mining</text>
    <text x="420" y="490">Conformance</text>
    <text x="580" y="490">Bottleneck Analyzer</text>
    <text x="740" y="490">Causal Improvement</text>
  </g>
  <g font-size="9" fill="#7c3aed">
    <text x="120" y="508">discovers workflows</text>
    <text x="280" y="508">UI/human traces</text>
    <text x="420" y="508">SOP vs actual</text>
    <text x="580" y="508">delays, loops, rework</text>
    <text x="740" y="508">proposes interventions</text>
  </g>

  <!-- Arrows -->
  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arr)">
    <line x1="190" y1="135" x2="218" y2="135"/>
    <line x1="360" y1="135" x2="388" y2="135"/>
    <line x1="550" y1="135" x2="578" y2="135"/>
    <line x1="740" y1="135" x2="768" y2="135"/>
    <line x1="240" y1="170" x2="240" y2="208"/>
    <line x1="700" y1="170" x2="700" y2="208"/>
  </g>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
