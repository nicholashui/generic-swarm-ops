<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="720" fill="#ffffff"/>
  <text x="480" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Performance-Critical Request Path</text>
  <text x="480" y="58" text-anchor="middle" font-size="12" fill="#64748b">Optimization points across backend, database, and retrieval layers</text>

  <!-- Client Request -->
  <rect x="380" y="80" width="200" height="44" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="480" y="107" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Client Request</text>

  <!-- FastAPI Backend -->
  <rect x="280" y="150" width="400" height="60" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="480" y="175" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1b4b">FastAPI Backend (uvicorn workers)</text>
  <text x="480" y="197" text-anchor="middle" font-size="11" fill="#3730a3">Rate limiting &#183; Request validation &#183; CORS &#183; Auth</text>

  <!-- Optimization point 1 -->
  <rect x="720" y="155" width="200" height="50" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="820" y="176" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">OPT-1: Worker Pool</text>
  <text x="820" y="193" text-anchor="middle" font-size="10" fill="#166534">async concurrency tuning</text>

  <!-- Risk Router -->
  <rect x="340" y="240" width="280" height="50" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="480" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#854d0e">Intake + Risk Router</text>
  <text x="480" y="279" text-anchor="middle" font-size="10" fill="#854d0e">classification &#183; tier assignment</text>

  <!-- Orchestrator -->
  <rect x="320" y="318" width="320" height="56" rx="8" fill="#c7d2fe" stroke="#4f46e5"/>
  <text x="480" y="342" text-anchor="middle" font-size="14" font-weight="700" fill="#1e1b4b">Business Orchestrator</text>
  <text x="480" y="362" text-anchor="middle" font-size="11" fill="#3730a3">state-graph execution &#183; tool dispatch</text>

  <!-- Three parallel paths -->
  <!-- Knowledge Retrieval -->
  <rect x="40" y="410" width="250" height="80" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="165" y="435" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">Knowledge Retrieval</text>
  <text x="165" y="455" text-anchor="middle" font-size="10" fill="#1d4ed8">Tier 0: Vector (cheapest)</text>
  <text x="165" y="470" text-anchor="middle" font-size="10" fill="#1d4ed8">Tier 1: LightRAG graph</text>
  <text x="165" y="485" text-anchor="middle" font-size="10" fill="#1d4ed8">Tier 2: RAPTOR summaries</text>

  <!-- Optimization point 2 -->
  <rect x="40" y="500" width="250" height="40" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="165" y="518" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">OPT-2: Escalation thresholds</text>
  <text x="165" y="533" text-anchor="middle" font-size="10" fill="#166534">80%+ traffic stays at Tier 0</text>

  <!-- PostgreSQL -->
  <rect x="355" y="410" width="250" height="80" rx="8" fill="#fae8ff" stroke="#a21caf"/>
  <text x="480" y="435" text-anchor="middle" font-size="12" font-weight="600" fill="#86198f">PostgreSQL (runtime_state)</text>
  <text x="480" y="455" text-anchor="middle" font-size="10" fill="#86198f">JSONB indexing (GIN)</text>
  <text x="480" y="470" text-anchor="middle" font-size="10" fill="#86198f">Connection pooling</text>
  <text x="480" y="485" text-anchor="middle" font-size="10" fill="#86198f">Query plan optimization</text>

  <!-- Optimization point 3 -->
  <rect x="355" y="500" width="250" height="40" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="480" y="518" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">OPT-3: JSONB GIN indexes</text>
  <text x="480" y="533" text-anchor="middle" font-size="10" fill="#166534">containment queries 10-50x faster</text>

  <!-- Tool Adapters -->
  <rect x="670" y="410" width="250" height="80" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="795" y="435" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">Tool Adapters</text>
  <text x="795" y="455" text-anchor="middle" font-size="10" fill="#854d0e">Concurrency pools</text>
  <text x="795" y="470" text-anchor="middle" font-size="10" fill="#854d0e">Fail-closed execution</text>
  <text x="795" y="485" text-anchor="middle" font-size="10" fill="#854d0e">Durable tool_effects</text>

  <!-- Optimization point 4 -->
  <rect x="670" y="500" width="250" height="40" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="795" y="518" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">OPT-4: Adapter batching</text>
  <text x="795" y="533" text-anchor="middle" font-size="10" fill="#166534">parallel tool dispatch</text>

  <!-- Caching Layer -->
  <rect x="260" y="575" width="440" height="50" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="480" y="597" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Response Caching + Next.js ISR</text>
  <text x="480" y="615" text-anchor="middle" font-size="10" fill="#475569">API response cache &#183; Static generation &#183; Client-side SWR</text>

  <!-- Metrics/Monitoring -->
  <rect x="260" y="650" width="440" height="46" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="480" y="678" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">Performance Metrics + Benchmarking</text>

  <!-- Arrows -->
  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arr)">
    <line x1="480" y1="124" x2="480" y2="148"/>
    <line x1="480" y1="210" x2="480" y2="238"/>
    <line x1="480" y1="290" x2="480" y2="316"/>
    <line x1="400" y1="374" x2="165" y2="408"/>
    <line x1="480" y1="374" x2="480" y2="408"/>
    <line x1="560" y1="374" x2="795" y2="408"/>
    <line x1="480" y1="540" x2="480" y2="573"/>
    <line x1="480" y1="625" x2="480" y2="648"/>
  </g>

  <!-- Horizontal connector to OPT-1 -->
  <g stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4 3" fill="none">
    <line x1="680" y1="180" x2="718" y2="180"/>
  </g>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
