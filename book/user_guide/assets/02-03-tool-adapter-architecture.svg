<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="560" fill="#ffffff"/>
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Tool Adapter Architecture</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">Request &#8594; Permission Check &#8594; Adapter Execution &#8594; tool_effects &#8594; Audit Log</text>

  <!-- Request -->
  <rect x="40" y="100" width="160" height="60" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="120" y="126" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">Tool Request</text>
  <text x="120" y="146" text-anchor="middle" font-size="10" fill="#475569">from workflow step</text>

  <!-- Permission Broker -->
  <rect x="240" y="100" width="180" height="60" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="330" y="126" text-anchor="middle" font-size="12" font-weight="600" fill="#7f1d1d">Permission Broker</text>
  <text x="330" y="146" text-anchor="middle" font-size="10" fill="#991b1b">RBAC + DNA allow-list</text>

  <!-- Adapter Execution -->
  <rect x="460" y="100" width="180" height="60" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="550" y="126" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">Adapter Execution</text>
  <text x="550" y="146" text-anchor="middle" font-size="10" fill="#166534">local adapter call</text>

  <!-- tool_effects -->
  <rect x="680" y="100" width="160" height="60" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="760" y="126" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">tool_effects</text>
  <text x="760" y="146" text-anchor="middle" font-size="10" fill="#1d4ed8">durable capture</text>

  <!-- Audit Log output -->
  <rect x="680" y="200" width="160" height="50" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="760" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#312e81">Audit Log</text>
  <text x="760" y="240" text-anchor="middle" font-size="10" fill="#3730a3">full provenance trail</text>

  <!-- Tool Adapters grid -->
  <rect x="60" y="290" width="840" height="240" rx="8" fill="#fafafa" stroke="#cbd5e1"/>
  <text x="480" y="318" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Shipped Tool Adapters</text>

  <!-- CRM -->
  <rect x="90" y="340" width="130" height="70" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="155" y="366" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">CRM</text>
  <text x="155" y="384" text-anchor="middle" font-size="10" fill="#166534">create/update</text>
  <text x="155" y="400" text-anchor="middle" font-size="10" fill="#166534">customer records</text>

  <!-- Billing -->
  <rect x="240" y="340" width="130" height="70" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="305" y="366" text-anchor="middle" font-size="12" font-weight="600" fill="#713f12">Billing</text>
  <text x="305" y="384" text-anchor="middle" font-size="10" fill="#854d0e">configure invoices</text>
  <text x="305" y="400" text-anchor="middle" font-size="10" fill="#854d0e">irreversible actions</text>

  <!-- Email -->
  <rect x="390" y="340" width="130" height="70" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="455" y="366" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">Email</text>
  <text x="455" y="384" text-anchor="middle" font-size="10" fill="#1d4ed8">send notifications</text>
  <text x="455" y="400" text-anchor="middle" font-size="10" fill="#1d4ed8">welcome packets</text>

  <!-- Audit -->
  <rect x="540" y="340" width="130" height="70" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="605" y="366" text-anchor="middle" font-size="12" font-weight="600" fill="#312e81">Audit</text>
  <text x="605" y="384" text-anchor="middle" font-size="10" fill="#3730a3">log all actions</text>
  <text x="605" y="400" text-anchor="middle" font-size="10" fill="#3730a3">compliance trail</text>

  <!-- Contract Parser -->
  <rect x="690" y="340" width="130" height="70" rx="8" fill="#fae8ff" stroke="#a21caf"/>
  <text x="755" y="366" text-anchor="middle" font-size="12" font-weight="600" fill="#701a75">Contract Parser</text>
  <text x="755" y="384" text-anchor="middle" font-size="10" fill="#86198f">extract clauses</text>
  <text x="755" y="400" text-anchor="middle" font-size="10" fill="#86198f">validate terms</text>

  <!-- Policy Retriever -->
  <rect x="240" y="430" width="130" height="70" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="305" y="456" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">Policy Retriever</text>
  <text x="305" y="474" text-anchor="middle" font-size="10" fill="#475569">fetch compliance</text>
  <text x="305" y="490" text-anchor="middle" font-size="10" fill="#475569">rules and SOPs</text>

  <!-- Fail-closed note -->
  <rect x="440" y="435" width="380" height="60" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="630" y="460" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d">Fail-Closed Behavior</text>
  <text x="630" y="478" text-anchor="middle" font-size="10" fill="#991b1b">Permission denied = step blocked (never fail-open)</text>
  <text x="630" y="492" text-anchor="middle" font-size="10" fill="#991b1b">Adapter error = rollback triggered + incident logged</text>

  <!-- Arrows -->
  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arr)">
    <line x1="200" y1="130" x2="238" y2="130"/>
    <line x1="420" y1="130" x2="458" y2="130"/>
    <line x1="640" y1="130" x2="678" y2="130"/>
    <line x1="760" y1="160" x2="760" y2="198"/>
  </g>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
