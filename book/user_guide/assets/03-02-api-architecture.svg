<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="680" fill="#ffffff"/>
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">API Architecture - FastAPI Backend</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">Authentication, route groups, middleware, and backend services</text>

  <!-- Client -->
  <rect x="380" y="74" width="200" height="44" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="480" y="101" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Client (Browser / CLI / API)</text>

  <!-- Auth layer -->
  <rect x="280" y="142" width="400" height="50" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="480" y="163" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Authentication Layer</text>
  <text x="480" y="181" text-anchor="middle" font-size="10" fill="#991b1b">PBKDF2 password + Bearer token | Cookie: gso_access_token</text>

  <!-- Middleware -->
  <rect x="200" y="216" width="560" height="44" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="480" y="243" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">Middleware: Request-ID | CORS | Security Headers | Rate Limiting | Error Envelopes</text>

  <!-- Route Groups -->
  <text x="480" y="290" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">API Route Groups (/api/v1/...)</text>

  <!-- Row 1 of routes -->
  <rect x="30" y="306" width="170" height="56" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="115" y="330" text-anchor="middle" font-size="11" font-weight="600" fill="#1e1b4b">/auth</text>
  <text x="115" y="348" text-anchor="middle" font-size="9" fill="#3730a3">login, register, me</text>

  <rect x="215" y="306" width="170" height="56" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="300" y="330" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">/workflows</text>
  <text x="300" y="348" text-anchor="middle" font-size="9" fill="#166534">CRUD + versions</text>

  <rect x="400" y="306" width="170" height="56" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="485" y="330" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">/runs</text>
  <text x="485" y="348" text-anchor="middle" font-size="9" fill="#166534">execute, status, detail</text>

  <rect x="585" y="306" width="170" height="56" rx="8" fill="#fae8ff" stroke="#a21caf"/>
  <text x="670" y="330" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">/approvals</text>
  <text x="670" y="348" text-anchor="middle" font-size="9" fill="#86198f">queue, approve, reject</text>

  <rect x="770" y="306" width="160" height="56" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="850" y="330" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">/knowledge</text>
  <text x="850" y="348" text-anchor="middle" font-size="9" fill="#1d4ed8">search, graph, gaps</text>

  <!-- Row 2 of routes -->
  <rect x="30" y="380" width="170" height="56" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="115" y="404" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">/memory</text>
  <text x="115" y="422" text-anchor="middle" font-size="9" fill="#1d4ed8">store, retrieve, scopes</text>

  <rect x="215" y="380" width="170" height="56" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="300" y="404" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">/processes</text>
  <text x="300" y="422" text-anchor="middle" font-size="9" fill="#166534">intelligence, mining</text>

  <rect x="400" y="380" width="170" height="56" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="485" y="404" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">/evolution</text>
  <text x="485" y="422" text-anchor="middle" font-size="9" fill="#5b21b6">variants, archive, promote</text>

  <rect x="585" y="380" width="170" height="56" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="670" y="404" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">/improvement</text>
  <text x="670" y="422" text-anchor="middle" font-size="9" fill="#5b21b6">reflect, lessons, propose</text>

  <rect x="770" y="380" width="160" height="56" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="850" y="404" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">/loops</text>
  <text x="850" y="422" text-anchor="middle" font-size="9" fill="#854d0e">run, status, stop</text>

  <!-- Row 3 -->
  <rect x="30" y="454" width="170" height="56" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="115" y="478" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">/domains</text>
  <text x="115" y="496" text-anchor="middle" font-size="9" fill="#475569">register, n3-status</text>

  <rect x="215" y="454" width="170" height="56" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="300" y="478" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">/settings</text>
  <text x="300" y="496" text-anchor="middle" font-size="9" fill="#475569">config, preferences</text>

  <rect x="400" y="454" width="170" height="56" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="485" y="478" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">/health</text>
  <text x="485" y="496" text-anchor="middle" font-size="9" fill="#475569">ready, liveness</text>

  <rect x="585" y="454" width="170" height="56" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="670" y="478" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">/agents</text>
  <text x="670" y="496" text-anchor="middle" font-size="9" fill="#475569">CRUD, activate, ALC</text>

  <rect x="770" y="454" width="160" height="56" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="850" y="478" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">/audit-logs</text>
  <text x="850" y="496" text-anchor="middle" font-size="9" fill="#475569">append-only trail</text>

  <!-- Backend Services -->
  <rect x="100" y="546" width="760" height="50" rx="8" fill="#ecfdf5" stroke="#059669"/>
  <text x="480" y="568" text-anchor="middle" font-size="13" font-weight="600" fill="#065f46">Backend Services</text>
  <text x="480" y="586" text-anchor="middle" font-size="10" fill="#065f46">RuntimeServices | CorpusEval | EvolutionEngine | GovernanceOfficer | KnowledgeOrchestrator</text>

  <!-- Data stores -->
  <rect x="100" y="618" width="350" height="44" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="275" y="645" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">PostgreSQL (runtime_state, audit, sessions)</text>

  <rect x="510" y="618" width="350" height="44" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="685" y="645" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">Knowledge Store (embeddings, graph, docs)</text>

  <!-- Arrows -->
  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arr02)">
    <line x1="480" y1="118" x2="480" y2="140"/>
    <line x1="480" y1="192" x2="480" y2="214"/>
    <line x1="480" y1="260" x2="480" y2="304"/>
    <line x1="480" y1="512" x2="480" y2="544"/>
    <line x1="275" y1="596" x2="275" y2="616"/>
    <line x1="685" y1="596" x2="685" y2="616"/>
  </g>

  <defs>
    <marker id="arr02" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
