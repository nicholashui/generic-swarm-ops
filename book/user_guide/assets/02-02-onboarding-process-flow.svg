<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="540" fill="#ffffff"/>
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Customer Onboarding Workflow (wf_customer_onboarding_v12)</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">End-to-end process flow with human gate, tool effects, and auto-reflect</text>

  <!-- Step 1: Intake -->
  <rect x="40" y="90" width="160" height="60" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="120" y="116" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">Intake</text>
  <text x="120" y="136" text-anchor="middle" font-size="10" fill="#475569">Run Now + case_id</text>

  <!-- Step 2: Verify Contract -->
  <rect x="230" y="90" width="160" height="60" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="310" y="116" text-anchor="middle" font-size="12" font-weight="600" fill="#312e81">verify_contract</text>
  <text x="310" y="136" text-anchor="middle" font-size="10" fill="#3730a3">governance_officer</text>

  <!-- Step 3: Create Record -->
  <rect x="420" y="90" width="160" height="60" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="500" y="116" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">create_customer_record</text>
  <text x="500" y="136" text-anchor="middle" font-size="10" fill="#166534">business_orchestrator</text>

  <!-- Step 4: Configure Billing (Human Gate) -->
  <rect x="610" y="90" width="160" height="60" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="690" y="116" text-anchor="middle" font-size="12" font-weight="600" fill="#7f1d1d">configure_billing</text>
  <text x="690" y="136" text-anchor="middle" font-size="10" fill="#991b1b">HUMAN GATE</text>

  <!-- Step 5: Send Welcome -->
  <rect x="800" y="90" width="140" height="60" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="870" y="116" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">send_welcome_packet</text>
  <text x="870" y="136" text-anchor="middle" font-size="10" fill="#1d4ed8">email adapter</text>

  <!-- Human Gate detail box -->
  <rect x="560" y="180" width="260" height="80" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="690" y="204" text-anchor="middle" font-size="11" font-weight="600" fill="#713f12">Human Approval Required</text>
  <text x="690" y="222" text-anchor="middle" font-size="10" fill="#854d0e">Irreversible billing action</text>
  <text x="690" y="240" text-anchor="middle" font-size="10" fill="#854d0e">Reviewer must approve before</text>
  <text x="690" y="256" text-anchor="middle" font-size="10" fill="#854d0e">billing configuration proceeds</text>

  <!-- Tool Effects row -->
  <rect x="80" y="300" width="800" height="50" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="480" y="322" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">tool_effects (durable record)</text>
  <text x="480" y="340" text-anchor="middle" font-size="10" fill="#475569">contract_parser &#183; crm &#183; billing_system &#183; email &#8212; each tool call writes durable effect log</text>

  <!-- Audit Log -->
  <rect x="180" y="380" width="280" height="50" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="320" y="402" text-anchor="middle" font-size="12" font-weight="600" fill="#312e81">Audit Log Write</text>
  <text x="320" y="420" text-anchor="middle" font-size="10" fill="#3730a3">Every step logged with provenance</text>

  <!-- Auto-Reflect -->
  <rect x="500" y="380" width="280" height="50" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="640" y="402" text-anchor="middle" font-size="12" font-weight="600" fill="#4c1d95">Auto-Reflect on Completion</text>
  <text x="640" y="420" text-anchor="middle" font-size="10" fill="#5b21b6">Lessons learned + optional auto-propose</text>

  <!-- Memory + Evaluation -->
  <rect x="180" y="460" width="280" height="50" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="320" y="482" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">Memory Write</text>
  <text x="320" y="500" text-anchor="middle" font-size="10" fill="#1d4ed8">event_log, decision_memory, lessons</text>

  <rect x="500" y="460" width="280" height="50" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="640" y="482" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">Evaluation</text>
  <text x="640" y="500" text-anchor="middle" font-size="10" fill="#166534">Quality, compliance, cycle time</text>

  <!-- Arrows -->
  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arr)">
    <line x1="200" y1="120" x2="228" y2="120"/>
    <line x1="390" y1="120" x2="418" y2="120"/>
    <line x1="580" y1="120" x2="608" y2="120"/>
    <line x1="770" y1="120" x2="798" y2="120"/>
    <line x1="690" y1="150" x2="690" y2="178"/>
    <line x1="480" y1="150" x2="480" y2="298"/>
    <line x1="480" y1="350" x2="320" y2="378"/>
    <line x1="480" y1="350" x2="640" y2="378"/>
    <line x1="320" y1="430" x2="320" y2="458"/>
    <line x1="640" y1="430" x2="640" y2="458"/>
  </g>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
