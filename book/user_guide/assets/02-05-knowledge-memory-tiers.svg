<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="620" fill="#ffffff"/>
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Knowledge Retrieval Tiers and Memory Types</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">Tiered retrieval (Tier 0 &#8594; Tier 1 &#8594; Tier 2) with provenance layer and eight memory types</text>

  <!-- Tier 0 -->
  <rect x="40" y="90" width="280" height="100" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="180" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">Tier 0 - Vector Search</text>
  <text x="180" y="140" text-anchor="middle" font-size="11" fill="#166534">Default, cheapest tier</text>
  <text x="180" y="158" text-anchor="middle" font-size="11" fill="#166534">Keyword + embedding similarity</text>
  <text x="180" y="176" text-anchor="middle" font-size="11" fill="#166534">Handles 80%+ of all queries</text>

  <!-- Tier 1 -->
  <rect x="340" y="90" width="280" height="100" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="480" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Tier 1 - LightRAG Graph</text>
  <text x="480" y="140" text-anchor="middle" font-size="11" fill="#1d4ed8">Entity-link multi-hop expansion</text>
  <text x="480" y="158" text-anchor="middle" font-size="11" fill="#1d4ed8">Relational queries (multi_hop=true)</text>
  <text x="480" y="176" text-anchor="middle" font-size="11" fill="#1d4ed8">Incremental updates, no rebuild</text>

  <!-- Tier 2 -->
  <rect x="640" y="90" width="280" height="100" rx="8" fill="#fae8ff" stroke="#a21caf"/>
  <text x="780" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#701a75">Tier 2 - RAPTOR Summaries</text>
  <text x="780" y="140" text-anchor="middle" font-size="11" fill="#86198f">Hierarchical cluster-and-summarize</text>
  <text x="780" y="158" text-anchor="middle" font-size="11" fill="#86198f">Corpus-wide synthesis questions</text>
  <text x="780" y="176" text-anchor="middle" font-size="11" fill="#86198f">Built lazily, on demand only</text>

  <!-- Escalation rule -->
  <rect x="140" y="210" width="680" height="40" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="480" y="236" text-anchor="middle" font-size="12" font-weight="600" fill="#713f12">Escalation: Tier 0 &#8594; Tier 1 (if multi-hop needed) &#8594; Tier 2 (if global synthesis needed)</text>

  <!-- Provenance Layer -->
  <rect x="40" y="270" width="880" height="50" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="480" y="292" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Always-On Provenance Layer</text>
  <text x="480" y="310" text-anchor="middle" font-size="11" fill="#475569">Every answer cites source documents, experts, event logs, or decisions regardless of tier</text>

  <!-- Memory Types heading -->
  <text x="480" y="352" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Eight Memory Types</text>

  <!-- Memory type boxes - row 1 -->
  <rect x="40" y="370" width="200" height="60" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="140" y="394" text-anchor="middle" font-size="11" font-weight="600" fill="#312e81">Event Memory</text>
  <text x="140" y="414" text-anchor="middle" font-size="10" fill="#3730a3">Raw operational logs</text>

  <rect x="260" y="370" width="200" height="60" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="360" y="394" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">Episodic Memory</text>
  <text x="360" y="414" text-anchor="middle" font-size="10" fill="#166534">Case narratives</text>

  <rect x="480" y="370" width="200" height="60" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="580" y="394" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">Semantic Memory</text>
  <text x="580" y="414" text-anchor="middle" font-size="10" fill="#1d4ed8">Facts and rules</text>

  <rect x="700" y="370" width="220" height="60" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="810" y="394" text-anchor="middle" font-size="11" font-weight="600" fill="#713f12">Procedural Memory</text>
  <text x="810" y="414" text-anchor="middle" font-size="10" fill="#854d0e">Skills and workflows</text>

  <!-- Memory type boxes - row 2 -->
  <rect x="40" y="450" width="200" height="60" rx="8" fill="#fae8ff" stroke="#a21caf"/>
  <text x="140" y="474" text-anchor="middle" font-size="11" font-weight="600" fill="#701a75">Decision Memory</text>
  <text x="140" y="494" text-anchor="middle" font-size="10" fill="#86198f">Decisions + reasons</text>

  <rect x="260" y="450" width="200" height="60" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="360" y="474" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d">Exception Memory</text>
  <text x="360" y="494" text-anchor="middle" font-size="10" fill="#991b1b">Edge cases</text>

  <rect x="480" y="450" width="200" height="60" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="580" y="474" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">Evaluation Memory</text>
  <text x="580" y="494" text-anchor="middle" font-size="10" fill="#475569">Test results</text>

  <rect x="700" y="450" width="220" height="60" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="810" y="474" text-anchor="middle" font-size="11" font-weight="600" fill="#4c1d95">Provenance Memory</text>
  <text x="810" y="494" text-anchor="middle" font-size="10" fill="#5b21b6">Source attribution</text>

  <!-- K1-lite Graph -->
  <rect x="140" y="540" width="680" height="56" rx="8" fill="#c7d2fe" stroke="#4f46e5"/>
  <text x="480" y="564" text-anchor="middle" font-size="13" font-weight="700" fill="#1e1b4b">K1-lite Graph Orchestration</text>
  <text x="480" y="584" text-anchor="middle" font-size="11" fill="#3730a3">Extract entities/claims/relations &#183; Operators: seed resolve (O1), lineage (O2), gaps (O5) &#183; Federation export</text>

  <!-- Arrows -->
  <g stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <line x1="180" y1="190" x2="180" y2="208"/>
    <line x1="480" y1="190" x2="480" y2="208"/>
    <line x1="780" y1="190" x2="780" y2="208"/>
    <line x1="480" y1="250" x2="480" y2="268"/>
    <line x1="480" y1="320" x2="480" y2="368"/>
    <line x1="480" y1="510" x2="480" y2="538"/>
  </g>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
