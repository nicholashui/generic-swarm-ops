<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="620" fill="#ffffff"/>
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Domain Pack Architecture</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">Self-contained business domain plugging into the host runtime</text>

  <!-- Host Runtime box -->
  <rect x="30" y="74" width="900" height="530" rx="8" fill="#f8fafc" stroke="#475569" stroke-dasharray="6,3"/>
  <text x="60" y="98" font-size="13" font-weight="600" fill="#475569">Host Runtime (generic-swarm-ops)</text>

  <!-- manifest.json central -->
  <rect x="370" y="110" width="220" height="50" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="480" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#1e1b4b">manifest.json</text>

  <!-- Domain Pack boundary -->
  <rect x="60" y="180" width="840" height="250" rx="8" fill="#faf5ff" stroke="#a21caf" stroke-dasharray="4,2"/>
  <text x="90" y="204" font-size="12" font-weight="600" fill="#a21caf">business/&lt;domain_id&gt;/</text>

  <!-- Agents -->
  <rect x="90" y="220" width="160" height="70" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="170" y="250" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Agents</text>
  <text x="170" y="270" text-anchor="middle" font-size="10" fill="#166534">agent_spec.json + ALC</text>

  <!-- Workflows -->
  <rect x="270" y="220" width="160" height="70" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="350" y="250" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Workflows</text>
  <text x="350" y="270" text-anchor="middle" font-size="10" fill="#1d4ed8">workflow DNA YAML</text>

  <!-- Tools -->
  <rect x="450" y="220" width="160" height="70" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="530" y="250" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Tools</text>
  <text x="530" y="270" text-anchor="middle" font-size="10" fill="#854d0e">namespaced adapters</text>

  <!-- Evals -->
  <rect x="630" y="220" width="160" height="70" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="710" y="250" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Evals</text>
  <text x="710" y="270" text-anchor="middle" font-size="10" fill="#991b1b">golden + regression</text>

  <!-- Knowledge -->
  <rect x="90" y="320" width="160" height="70" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="170" y="350" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Knowledge</text>
  <text x="170" y="370" text-anchor="middle" font-size="10" fill="#3730a3">seeds/ + RAG docs</text>

  <!-- Policies -->
  <rect x="270" y="320" width="160" height="70" rx="8" fill="#fae8ff" stroke="#a21caf"/>
  <text x="350" y="350" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Policies</text>
  <text x="350" y="370" text-anchor="middle" font-size="10" fill="#86198f">governance rules</text>

  <!-- UI -->
  <rect x="450" y="320" width="160" height="70" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="530" y="350" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">UI</text>
  <text x="530" y="370" text-anchor="middle" font-size="10" fill="#475569">domain-specific views</text>

  <!-- Schemas -->
  <rect x="630" y="320" width="160" height="70" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="710" y="350" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Schemas</text>
  <text x="710" y="370" text-anchor="middle" font-size="10" fill="#475569">JSON Schema validation</text>

  <!-- Host Services Row -->
  <rect x="60" y="460" width="200" height="56" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="160" y="484" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">FastAPI Runtime</text>
  <text x="160" y="502" text-anchor="middle" font-size="10" fill="#166534">routes + middleware</text>

  <rect x="280" y="460" width="200" height="56" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="380" y="484" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">Evolution Engine</text>
  <text x="380" y="502" text-anchor="middle" font-size="10" fill="#1d4ed8">sandbox + corpus eval</text>

  <rect x="500" y="460" width="200" height="56" rx="8" fill="#fae8ff" stroke="#a21caf"/>
  <text x="600" y="484" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">Governance Officer</text>
  <text x="600" y="502" text-anchor="middle" font-size="10" fill="#86198f">risk tiers + gates</text>

  <rect x="720" y="460" width="170" height="56" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="805" y="484" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">Postgres Store</text>
  <text x="805" y="502" text-anchor="middle" font-size="10" fill="#854d0e">runtime_state</text>

  <!-- Infrastructure bar -->
  <rect x="60" y="546" width="840" height="42" rx="8" fill="#ecfdf5" stroke="#059669"/>
  <text x="480" y="572" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">Registration CLI (register_domain.py) | API POST /api/v1/domains/register | Schema Validation</text>

  <!-- Arrows from manifest to components -->
  <g stroke="#6366f1" stroke-width="1.5" fill="none" marker-end="url(#arr01)">
    <line x1="420" y1="160" x2="170" y2="218"/>
    <line x1="460" y1="160" x2="350" y2="218"/>
    <line x1="500" y1="160" x2="530" y2="218"/>
    <line x1="540" y1="160" x2="710" y2="218"/>
  </g>

  <!-- Arrows from pack to host services -->
  <g stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arr01)">
    <line x1="170" y1="430" x2="160" y2="458"/>
    <line x1="350" y1="430" x2="380" y2="458"/>
    <line x1="530" y1="430" x2="600" y2="458"/>
    <line x1="710" y1="430" x2="805" y2="458"/>
  </g>

  <defs>
    <marker id="arr01" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
</svg>
