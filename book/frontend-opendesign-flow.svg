<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="760" viewBox="0 0 1300 760">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .text { font: 15px Arial, sans-serif; fill: #334155; }
      .box { rx: 18; ry: 18; stroke-width: 2.5; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#head); }
    </style>
    <marker id="head" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1300" height="760" fill="#f8fafc"/>
  <text x="650" y="52" text-anchor="middle" class="title">Mandatory OpenDesign MCP Workflow</text>

  <rect x="70" y="140" width="170" height="90" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="155" y="192" text-anchor="middle" class="label">Trae</text>

  <rect x="300" y="140" width="200" height="90" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="400" y="180" text-anchor="middle" class="label">get_director_protocol</text>
  <text x="400" y="206" text-anchor="middle" class="text">Understand the design process</text>

  <rect x="560" y="140" width="180" height="90" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="650" y="180" text-anchor="middle" class="label">search_designs</text>
  <text x="650" y="206" text-anchor="middle" class="text">Find strong references</text>

  <rect x="800" y="140" width="200" height="90" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="900" y="180" text-anchor="middle" class="label">get_design_system</text>
  <text x="900" y="206" text-anchor="middle" class="text">Extract tokens and patterns</text>

  <rect x="1060" y="140" width="170" height="90" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="1145" y="180" text-anchor="middle" class="label">fetch_spec</text>
  <text x="1145" y="206" text-anchor="middle" class="text">Read layout details</text>

  <line x1="240" y1="185" x2="300" y2="185" class="arrow"/>
  <line x1="500" y1="185" x2="560" y2="185" class="arrow"/>
  <line x1="740" y1="185" x2="800" y2="185" class="arrow"/>
  <line x1="1000" y1="185" x2="1060" y2="185" class="arrow"/>

  <rect x="220" y="360" width="860" height="130" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="650" y="402" text-anchor="middle" class="label">Document Before Coding</text>
  <text x="650" y="432" text-anchor="middle" class="text">Selected reference, why it fits, extracted tokens, typography, spacing, layout grid, component hierarchy, responsive behavior, accessibility concerns, implementation plan</text>
  <text x="650" y="462" text-anchor="middle" class="text">This step is mandatory before major frontend page implementation</text>

  <path d="M1145 230 C1145 300, 650 300, 650 360" class="arrow"/>

  <rect x="340" y="560" width="620" height="110" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="650" y="600" text-anchor="middle" class="label">Implement React + TypeScript + Tailwind Page</text>
  <text x="650" y="630" text-anchor="middle" class="text">Use design-system rules instead of guessing from generic AI memory</text>

  <line x1="650" y1="490" x2="650" y2="560" class="arrow"/>
</svg>
