<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .text { font: 16px Arial, sans-serif; fill: #334155; }
      .small { font: 15px Arial, sans-serif; fill: #475569; }
      .box { rx: 20; ry: 20; stroke-width: 2.5; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#head); }
    </style>
    <marker id="head" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#f8fafc"/>
  <text x="600" y="52" text-anchor="middle" class="title">Frontend Ops Console (shipped)</text>

  <rect x="120" y="100" width="960" height="90" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="600" y="138" text-anchor="middle" class="label">User Browser</text>
  <text x="600" y="166" text-anchor="middle" class="text">Login · live lists · create forms · Run now · approvals · Improve · Evolution archive</text>

  <line x1="600" y1="190" x2="600" y2="240" class="arrow"/>
  <text x="625" y="222" class="small">HTTPS</text>

  <rect x="120" y="240" width="960" height="180" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="600" y="280" text-anchor="middle" class="label">Next.js Frontend (ops when DEMO_MODE=false)</text>
  <text x="600" y="312" text-anchor="middle" class="text">OpenAPI typed client · real create forms · Run detail Improve pipeline</text>
  <text x="600" y="344" text-anchor="middle" class="text">/app/evolution population archive · Playwright smoke · permission-aware UI</text>
  <text x="600" y="376" text-anchor="middle" class="small">Never final authority for security or workflow execution</text>

  <line x1="600" y1="420" x2="600" y2="480" class="arrow"/>
  <text x="625" y="458" class="small">REST + SSE</text>

  <rect x="120" y="480" width="960" height="180" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="600" y="528" text-anchor="middle" class="label">Backend API + Postgres</text>
  <text x="600" y="564" text-anchor="middle" class="text">Auth · workflows · adapters · approvals · knowledge · improvement · loops · evolution</text>
  <text x="600" y="600" text-anchor="middle" class="small">Final authority for authz, governance, execution, secrets, and promotion gates</text>
</svg>
