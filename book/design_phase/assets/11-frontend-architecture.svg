<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="560" fill="#ffffff"/>
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Frontend · Next.js Ops Console</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#64748b">Frontend may request actions; backend decides whether they are allowed</text>

  <!-- chain -->
  <g font-size="12" font-weight="600" text-anchor="middle">
    <rect x="50"  y="80" width="170" height="48" rx="8" fill="#e0e7ff" stroke="#6366f1"/><text x="135" y="109" fill="#312e81">User Browser</text>
    <rect x="260" y="80" width="210" height="48" rx="8" fill="#dbeafe" stroke="#2563eb"/><text x="365" y="109" fill="#1e3a8a">Next.js Frontend</text>
    <rect x="510" y="80" width="180" height="48" rx="8" fill="#dcfce7" stroke="#16a34a"/><text x="600" y="109" fill="#14532d">Backend API</text>
    <rect x="730" y="80" width="170" height="48" rx="8" fill="#f1f5f9" stroke="#475569"/><text x="815" y="109" fill="#0f172a">Postgres + tools</text>
  </g>
  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#a)">
    <line x1="220" y1="104" x2="258" y2="104"/>
    <line x1="470" y1="104" x2="508" y2="104"/>
    <line x1="690" y1="104" x2="728" y2="104"/>
  </g>

  <!-- app shell -->
  <rect x="40" y="160" width="220" height="280" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="150" y="188" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">App Shell</text>
  <g font-size="11" fill="#334155">
    <text x="56" y="218">Sidebar navigation</text>
    <text x="56" y="242">Header + breadcrumbs</text>
    <text x="56" y="266">Command palette</text>
    <text x="56" y="290">Org switcher</text>
    <text x="56" y="314">Role-aware menus</text>
    <text x="56" y="338">Demo vs ops mode</text>
    <text x="56" y="362">OpenAPI typed client</text>
    <text x="56" y="386">Playwright smoke</text>
  </g>

  <!-- route groups -->
  <rect x="280" y="160" width="640" height="280" rx="8" fill="#fafafa" stroke="#cbd5e1"/>
  <text x="600" y="188" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Product Surface (/app) — live when DEMO_MODE=false</text>
  <g font-size="11" text-anchor="middle">
    <rect x="296" y="208" width="120" height="38" rx="6" fill="#e0e7ff" stroke="#6366f1"/><text x="356" y="232" fill="#312e81">Dashboard</text>
    <rect x="430" y="208" width="120" height="38" rx="6" fill="#e0e7ff" stroke="#6366f1"/><text x="490" y="232" fill="#312e81">Agents</text>
    <rect x="564" y="208" width="120" height="38" rx="6" fill="#e0e7ff" stroke="#6366f1"/><text x="624" y="232" fill="#312e81">Workflows</text>
    <rect x="698" y="208" width="150" height="38" rx="6" fill="#fef9c3" stroke="#ca8a04"/><text x="773" y="232" fill="#713f12">Workflow Runs</text>

    <rect x="296" y="260" width="120" height="38" rx="6" fill="#fef9c3" stroke="#ca8a04"/><text x="356" y="284" fill="#713f12">Approvals</text>
    <rect x="430" y="260" width="120" height="38" rx="6" fill="#dbeafe" stroke="#2563eb"/><text x="490" y="284" fill="#1e3a8a">Knowledge</text>
    <rect x="564" y="260" width="120" height="38" rx="6" fill="#dbeafe" stroke="#2563eb"/><text x="624" y="284" fill="#1e3a8a">Memory</text>
    <rect x="698" y="260" width="150" height="38" rx="6" fill="#dcfce7" stroke="#16a34a"/><text x="773" y="284" fill="#14532d">Evaluations</text>

    <rect x="296" y="312" width="120" height="38" rx="6" fill="#dcfce7" stroke="#16a34a"/><text x="356" y="336" fill="#14532d">Processes</text>
    <rect x="430" y="312" width="120" height="38" rx="6" fill="#fae8ff" stroke="#a21caf"/><text x="490" y="336" fill="#701a75">Audit Logs</text>
    <rect x="564" y="312" width="120" height="38" rx="6" fill="#ede9fe" stroke="#7c3aed"/><text x="624" y="336" fill="#4c1d95">Evolution</text>
    <rect x="698" y="312" width="150" height="38" rx="6" fill="#f1f5f9" stroke="#475569"/><text x="773" y="336" fill="#0f172a">Settings</text>
  </g>
  <text x="600" y="380" text-anchor="middle" font-size="12" fill="#475569">Real create forms · Run now · Improve: Reflect → Propose → Evaluate → Canary</text>
  <text x="600" y="404" text-anchor="middle" font-size="11" fill="#64748b">Route protection is UX-level only; backend authorization remains final</text>

  <rect x="80" y="470" width="800" height="56" rx="8" fill="#ecfdf5" stroke="#059669"/>
  <text x="480" y="504" text-anchor="middle" font-size="13" font-weight="600" fill="#065f46">E1 path: login → live lists → create → run → gate → complete → Improve → archive</text>

  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
