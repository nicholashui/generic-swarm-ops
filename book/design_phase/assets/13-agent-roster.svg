<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="480" fill="#ffffff"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Agent Roster</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#64748b">Control / meta agents govern; learning agents acquire knowledge; domain agents execute</text>

  <!-- control -->
  <rect x="30" y="80" width="840" height="128" rx="8" fill="#eef2ff" stroke="#4f46e5"/>
  <text x="50" y="104" font-size="13" font-weight="700" fill="#312e81">Control / Meta</text>
  <g font-size="11" text-anchor="middle" fill="#312e81">
    <rect x="50"  y="116" width="150" height="34" rx="6" fill="#e0e7ff" stroke="#6366f1"/><text x="125" y="138">Business Orchestrator</text>
    <rect x="215" y="116" width="150" height="34" rx="6" fill="#e0e7ff" stroke="#6366f1"/><text x="290" y="138">Evolution Manager</text>
    <rect x="380" y="116" width="150" height="34" rx="6" fill="#e0e7ff" stroke="#6366f1"/><text x="455" y="138">Evaluation Harness</text>
    <rect x="545" y="116" width="150" height="34" rx="6" fill="#e0e7ff" stroke="#6366f1"/><text x="620" y="138">Governance Officer</text>
    <rect x="710" y="116" width="150" height="34" rx="6" fill="#e0e7ff" stroke="#6366f1"/><text x="785" y="138">Security Red-Team</text>
    <rect x="130" y="158" width="150" height="34" rx="6" fill="#e0e7ff" stroke="#6366f1"/><text x="205" y="180">Memory Steward</text>
    <rect x="375" y="158" width="150" height="34" rx="6" fill="#e0e7ff" stroke="#6366f1"/><text x="450" y="180">Tool Permission Broker</text>
    <rect x="620" y="158" width="150" height="34" rx="6" fill="#e0e7ff" stroke="#6366f1"/><text x="695" y="180">Incident Commander</text>
  </g>

  <!-- learning -->
  <rect x="30" y="222" width="840" height="128" rx="8" fill="#ecfdf5" stroke="#16a34a"/>
  <text x="50" y="246" font-size="13" font-weight="700" fill="#14532d">Learning</text>
  <g font-size="11" text-anchor="middle" fill="#14532d">
    <rect x="50"  y="258" width="150" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/><text x="125" y="280">Expert Shadow</text>
    <rect x="215" y="258" width="150" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/><text x="290" y="280">Cognitive Task Analyst</text>
    <rect x="380" y="258" width="150" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/><text x="455" y="280">Process Miner</text>
    <rect x="545" y="258" width="150" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/><text x="620" y="280">Task Mining</text>
    <rect x="710" y="258" width="150" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/><text x="785" y="280">Conformance</text>
    <rect x="130" y="300" width="150" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/><text x="205" y="322">Bottleneck Analyzer</text>
    <rect x="375" y="300" width="150" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/><text x="450" y="322">Knowledge Distiller</text>
    <rect x="620" y="300" width="150" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/><text x="695" y="322">Knowledge Curator</text>
  </g>

  <!-- domain -->
  <rect x="30" y="364" width="840" height="90" rx="8" fill="#fffbeb" stroke="#ca8a04"/>
  <text x="50" y="388" font-size="13" font-weight="700" fill="#713f12">Execution / Domain (examples)</text>
  <g font-size="11" text-anchor="middle" fill="#713f12">
    <rect x="90"  y="400" width="160" height="34" rx="6" fill="#fef9c3" stroke="#ca8a04"/><text x="170" y="422">Quality Compliance</text>
    <rect x="270" y="400" width="160" height="34" rx="6" fill="#fef9c3" stroke="#ca8a04"/><text x="350" y="422">Execution Agent</text>
    <rect x="450" y="400" width="160" height="34" rx="6" fill="#fef9c3" stroke="#ca8a04"/><text x="530" y="422">Finance Ops</text>
    <rect x="630" y="400" width="180" height="34" rx="6" fill="#fef9c3" stroke="#ca8a04"/><text x="720" y="422">Communications</text>
  </g>
</svg>
