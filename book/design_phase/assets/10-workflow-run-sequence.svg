<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="560" fill="#ffffff"/>
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Workflow Run &#183; Execution Sequence</text>

  <!-- lifelines -->
  <g font-size="12" font-weight="700" text-anchor="middle">
    <rect x="40"  y="52" width="120" height="34" rx="6" fill="#e0e7ff" stroke="#6366f1"/><text x="100" y="74" fill="#312e81">Frontend</text>
    <rect x="220" y="52" width="120" height="34" rx="6" fill="#dbeafe" stroke="#2563eb"/><text x="280" y="74" fill="#1e3a8a">API</text>
    <rect x="400" y="52" width="120" height="34" rx="6" fill="#fef9c3" stroke="#ca8a04"/><text x="460" y="74" fill="#713f12">Queue</text>
    <rect x="580" y="52" width="120" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/><text x="640" y="74" fill="#14532d">Worker</text>
    <rect x="760" y="52" width="120" height="34" rx="6" fill="#fae8ff" stroke="#a21caf"/><text x="820" y="74" fill="#701a75">Governance</text>
  </g>
  <g stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 4">
    <line x1="100" y1="86" x2="100" y2="530"/>
    <line x1="280" y1="86" x2="280" y2="530"/>
    <line x1="460" y1="86" x2="460" y2="530"/>
    <line x1="640" y1="86" x2="640" y2="530"/>
    <line x1="820" y1="86" x2="820" y2="530"/>
  </g>

  <g font-size="11" fill="#0f172a">
    <!-- start -->
    <line x1="100" y1="110" x2="278" y2="110" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>
    <text x="188" y="104" text-anchor="middle">POST run (Idempotency-Key)</text>
    <line x1="280" y1="140" x2="458" y2="140" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>
    <text x="368" y="134" text-anchor="middle">enqueue (status: queued)</text>
    <line x1="460" y1="170" x2="638" y2="170" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>
    <text x="550" y="164" text-anchor="middle">worker picks up run</text>
    <!-- loop -->
    <rect x="560" y="190" width="300" height="150" rx="8" fill="none" stroke="#94a3b8" stroke-dasharray="5 3"/>
    <text x="575" y="206" font-size="10" fill="#475569">for each step:</text>
    <line x1="640" y1="224" x2="818" y2="224" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>
    <text x="730" y="218" text-anchor="middle">check permission + policy</text>
    <line x1="820" y1="252" x2="642" y2="252" stroke="#dc2626" stroke-width="1.5" marker-end="url(#a)"/>
    <text x="730" y="246" text-anchor="middle" fill="#991b1b">require_approval?</text>
    <line x1="640" y1="288" x2="640" y2="310" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a)"/>
    <text x="700" y="304" text-anchor="middle" fill="#166534">execute agent / tool</text>
    <text x="700" y="326" text-anchor="middle" fill="#475569">write audit log + emit event</text>
    <!-- approval pause -->
    <line x1="640" y1="368" x2="102" y2="368" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#a)"/>
    <text x="370" y="362" text-anchor="middle" fill="#854d0e">SSE: approval.requested (waiting_for_approval)</text>
    <line x1="100" y1="398" x2="278" y2="398" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>
    <text x="188" y="392" text-anchor="middle">reviewer approves</text>
    <line x1="280" y1="428" x2="638" y2="428" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>
    <text x="459" y="422" text-anchor="middle">resume run</text>
    <!-- eval + finish -->
    <line x1="640" y1="458" x2="640" y2="480" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a)"/>
    <text x="720" y="474" text-anchor="middle" fill="#166534">final evaluation</text>
    <line x1="640" y1="504" x2="102" y2="504" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>
    <text x="370" y="498" text-anchor="middle">SSE: run.completed + output</text>
  </g>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
</svg>
