<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" font-family="Segoe UI, Arial, sans-serif">
  <rect width="920" height="420" fill="#ffffff"/>
  <text x="460" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Evolution + Self-Improvement (sandbox only)</text>
  <text x="460" y="54" text-anchor="middle" font-size="12" fill="#64748b">Never mutate production DNA directly &#183; auto_promote forbidden</text>

  <!-- steps spaced evenly -->
  <rect x="40" y="100" width="150" height="90" rx="10" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="115" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#312e81">1. Reflect</text>
  <text x="115" y="160" text-anchor="middle" font-size="11" fill="#4338ca">lessons from run</text>
  <text x="115" y="178" text-anchor="middle" font-size="11" fill="#4338ca">auto on terminal</text>

  <rect x="210" y="100" width="150" height="90" rx="10" fill="#dbeafe" stroke="#2563eb"/>
  <text x="285" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">2. Propose</text>
  <text x="285" y="160" text-anchor="middle" font-size="11" fill="#1d4ed8">sandbox_only</text>
  <text x="285" y="178" text-anchor="middle" font-size="11" fill="#1d4ed8">variant DNA</text>

  <rect x="380" y="100" width="150" height="90" rx="10" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="455" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#713f12">3. Evaluate</text>
  <text x="455" y="160" text-anchor="middle" font-size="11" fill="#854d0e">disk corpus</text>
  <text x="455" y="178" text-anchor="middle" font-size="11" fill="#854d0e">fitness metrics</text>

  <rect x="550" y="100" width="150" height="90" rx="10" fill="#dcfce7" stroke="#16a34a"/>
  <text x="625" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">4. Canary</text>
  <text x="625" y="160" text-anchor="middle" font-size="11" fill="#166534">approved_for_canary</text>
  <text x="625" y="178" text-anchor="middle" font-size="11" fill="#166534">or versioned promote</text>

  <rect x="720" y="100" width="150" height="90" rx="10" fill="#fee2e2" stroke="#dc2626"/>
  <text x="795" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">5. Rollback</text>
  <text x="795" y="160" text-anchor="middle" font-size="11" fill="#991b1b">restore previous</text>
  <text x="795" y="178" text-anchor="middle" font-size="11" fill="#991b1b">active_version</text>

  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#earr)">
    <line x1="190" y1="145" x2="208" y2="145"/>
    <line x1="360" y1="145" x2="378" y2="145"/>
    <line x1="530" y1="145" x2="548" y2="145"/>
    <line x1="700" y1="145" x2="718" y2="145"/>
  </g>

  <rect x="80" y="240" width="760" height="70" rx="10" fill="#f1f5f9" stroke="#475569"/>
  <text x="460" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Corpus suites (business/evals)</text>
  <text x="460" y="294" text-anchor="middle" font-size="12" fill="#334155">golden &#8805;20 &#183; regression &#183; adversarial &#183; historical-replay &#183; retrieval fixtures</text>

  <rect x="80" y="330" width="760" height="60" rx="10" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="460" y="356" text-anchor="middle" font-size="13" font-weight="600" fill="#4c1d95">FE: Improve pipeline on run detail &#183; GET /evolution/archive population view</text>
  <text x="460" y="376" text-anchor="middle" font-size="11" fill="#5b21b6">direct_production_mutation always blocked</text>

  <defs>
    <marker id="earr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
