<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="560" fill="#ffffff"/>
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Workflow DNA · Bounded State Graph</text>
  <text x="480" y="54" text-anchor="middle" font-size="12" fill="#64748b">Graph enforces state, permissions, gates · tools leave durable tool_effects</text>

  <!-- pipeline row with spacing -->
  <g font-size="11" font-weight="600">
    <rect x="24"  y="90" width="130" height="50" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
    <text x="89" y="120" text-anchor="middle" fill="#312e81">Intake Router</text>
    <rect x="172" y="90" width="130" height="50" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
    <text x="237" y="120" text-anchor="middle" fill="#312e81">Risk Classifier</text>
    <rect x="320" y="90" width="130" height="50" rx="8" fill="#c7d2fe" stroke="#4f46e5"/>
    <text x="385" y="120" text-anchor="middle" fill="#312e81">Orchestrator</text>
    <rect x="468" y="90" width="120" height="50" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="528" y="120" text-anchor="middle" fill="#1e3a8a">Research</text>
    <rect x="606" y="90" width="120" height="50" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="666" y="120" text-anchor="middle" fill="#14532d">Execution</text>
    <rect x="744" y="90" width="130" height="50" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
    <text x="809" y="120" text-anchor="middle" fill="#713f12">Verification</text>
  </g>

  <g font-size="11" font-weight="600">
    <rect x="300" y="180" width="140" height="54" rx="8" fill="#fae8ff" stroke="#a21caf"/>
    <text x="370" y="212" text-anchor="middle" fill="#701a75">Compliance</text>
    <rect x="460" y="180" width="160" height="54" rx="8" fill="#fee2e2" stroke="#dc2626"/>
    <text x="540" y="204" text-anchor="middle" fill="#7f1d1d">Human Gate</text>
    <text x="540" y="222" text-anchor="middle" fill="#991b1b" font-size="10">high-risk / irreversible</text>
    <rect x="640" y="180" width="220" height="54" rx="8" fill="#f1f5f9" stroke="#475569"/>
    <text x="750" y="212" text-anchor="middle" fill="#0f172a">Audit + Memory Write</text>
  </g>

  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#a)">
    <line x1="154" y1="115" x2="170" y2="115"/>
    <line x1="302" y1="115" x2="318" y2="115"/>
    <line x1="450" y1="115" x2="466" y2="115"/>
    <line x1="588" y1="115" x2="604" y2="115"/>
    <line x1="726" y1="115" x2="742" y2="115"/>
    <line x1="809" y1="140" x2="809" y2="160"/>
    <line x1="809" y1="160" x2="370" y2="160"/>
    <line x1="370" y1="160" x2="370" y2="178"/>
    <line x1="440" y1="207" x2="458" y2="207"/>
    <line x1="620" y1="207" x2="638" y2="207"/>
  </g>

  <!-- DNA contract -->
  <rect x="40" y="270" width="420" height="220" rx="8" fill="#fafafa" stroke="#cbd5e1"/>
  <text x="250" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Every Workflow DNA declares</text>
  <g font-size="12" fill="#334155">
    <text x="60" y="330">• bounded steps, explicit agents + tools</text>
    <text x="60" y="354">• memory reads / writes (scoped)</text>
    <text x="60" y="378">• guardrails (human-approval conditions)</text>
    <text x="60" y="402">• verification required_checks</text>
    <text x="60" y="426">• rollback plan (reversibility)</text>
    <text x="60" y="450">• fitness metrics + audit-log write</text>
  </g>

  <!-- runtime + validator -->
  <rect x="490" y="270" width="430" height="220" rx="8" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="705" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">Runtime (shipped)</text>
  <g font-size="12" fill="#991b1b">
    <text x="510" y="332">• local adapters → durable tool_effects</text>
    <text x="510" y="356">• gates pause until approval</text>
    <text x="510" y="380">• auto-reflect on terminal status</text>
    <text x="510" y="404">• sandbox propose never hits production</text>
    <text x="510" y="436" font-weight="700">Reject DNA if: no gate / no rollback /</text>
    <text x="510" y="456" font-weight="700">missing provenance / no audit write</text>
  </g>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
