<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="500" fill="#ffffff"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Agentic Security · Blast-Radius Control</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#64748b">Deterministic gates outside the LLM · adapters fail closed · sandbox evolution only</text>

  <!-- untrusted zone -->
  <rect x="40" y="80" width="360" height="180" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-dasharray="6 4"/>
  <text x="220" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">Untrusted Inputs</text>
  <g font-size="11" fill="#991b1b">
    <text x="220" y="132" text-anchor="middle">retrieved documents &#183; user content</text>
    <text x="220" y="152" text-anchor="middle">tool outputs &#183; web results</text>
    <text x="220" y="180" text-anchor="middle" font-weight="700">Indirect prompt injection is</text>
    <text x="220" y="198" text-anchor="middle" font-weight="700">the key agentic threat</text>
    <text x="220" y="226" text-anchor="middle">Treat all as data, never instructions</text>
  </g>

  <!-- deterministic gate -->
  <rect x="440" y="100" width="180" height="140" rx="10" fill="#e0e7ff" stroke="#4f46e5"/>
  <text x="530" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#312e81">Deterministic</text>
  <text x="530" y="160" text-anchor="middle" font-size="13" font-weight="700" fill="#312e81">Policy Gate</text>
  <text x="530" y="188" text-anchor="middle" font-size="11" fill="#3730a3">least privilege</text>
  <text x="530" y="206" text-anchor="middle" font-size="11" fill="#3730a3">scoped credentials</text>
  <text x="530" y="224" text-anchor="middle" font-size="11" fill="#3730a3">approval gates</text>

  <!-- tools -->
  <rect x="670" y="100" width="190" height="140" rx="10" fill="#dcfce7" stroke="#16a34a"/>
  <text x="765" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">Tools &amp; Actions</text>
  <text x="765" y="168" text-anchor="middle" font-size="11" fill="#166534">email &#183; CRM &#183; billing</text>
  <text x="765" y="188" text-anchor="middle" font-size="11" fill="#166534">DB &#183; external APIs</text>
  <text x="765" y="216" text-anchor="middle" font-size="11" fill="#166534">executed only if allowed</text>

  <g stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#a)">
    <line x1="400" y1="170" x2="438" y2="170"/>
    <line x1="620" y1="170" x2="668" y2="170"/>
  </g>

  <!-- control matrix -->
  <text x="450" y="300" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">OWASP-mapped control coverage</text>
  <g font-size="11" fill="#334155">
    <rect x="40" y="316" width="260" height="30" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/><text x="52" y="336">LLM01 Prompt injection &#8594; blast-radius limits</text>
    <rect x="320" y="316" width="260" height="30" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/><text x="332" y="336">LLM02 Info disclosure &#8594; DLP, no secrets</text>
    <rect x="600" y="316" width="260" height="30" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/><text x="612" y="336">LLM03 Supply chain &#8594; registry, SBOM</text>
    <rect x="40" y="352" width="260" height="30" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/><text x="52" y="372">LLM04 Poisoning &#8594; write-filter memory</text>
    <rect x="320" y="352" width="260" height="30" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/><text x="332" y="372">LLM06 Excessive agency &#8594; risk tiers</text>
    <rect x="600" y="352" width="260" height="30" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/><text x="612" y="372">LLM07 Prompt leakage &#8594; external authz</text>
    <rect x="40" y="388" width="260" height="30" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/><text x="52" y="408">LLM08 Vector weakness &#8594; tenant isolation</text>
    <rect x="320" y="388" width="260" height="30" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/><text x="332" y="408">LLM09 Misinformation &#8594; grounding + cites</text>
    <rect x="600" y="388" width="260" height="30" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/><text x="612" y="408">LLM10 Unbounded use &#8594; budget caps</text>
  </g>
  <text x="450" y="450" text-anchor="middle" font-size="12" fill="#475569">Plus agentic controls: Tool Permission Broker, memory-poisoning defense, skill vetting, full observability, incident runbook.</text>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
