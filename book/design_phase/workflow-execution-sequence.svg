<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="840" viewBox="0 0 1400 840">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .text { font: 15px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#head); }
      .dash { stroke-dasharray: 8 6; }
    </style>
    <marker id="head" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1400" height="840" fill="#f8fafc"/>
  <text x="700" y="48" text-anchor="middle" class="title">Workflow Start And Execution Sequence</text>

  <text x="120" y="100" text-anchor="middle" class="label">Frontend</text>
  <text x="420" y="100" text-anchor="middle" class="label">Backend API</text>
  <text x="740" y="100" text-anchor="middle" class="label">Governance + Audit</text>
  <text x="1060" y="100" text-anchor="middle" class="label">Queue + Worker</text>
  <text x="1280" y="100" text-anchor="middle" class="label">Storage</text>

  <line x1="120" y1="120" x2="120" y2="770" stroke="#94a3b8" stroke-width="2"/>
  <line x1="420" y1="120" x2="420" y2="770" stroke="#94a3b8" stroke-width="2"/>
  <line x1="740" y1="120" x2="740" y2="770" stroke="#94a3b8" stroke-width="2"/>
  <line x1="1060" y1="120" x2="1060" y2="770" stroke="#94a3b8" stroke-width="2"/>
  <line x1="1280" y1="120" x2="1280" y2="770" stroke="#94a3b8" stroke-width="2"/>

  <line x1="120" y1="160" x2="420" y2="160" class="arrow"/>
  <text x="270" y="150" text-anchor="middle" class="text">POST /workflows/{id}/runs</text>

  <line x1="420" y1="220" x2="740" y2="220" class="arrow"/>
  <text x="580" y="210" text-anchor="middle" class="text">authenticate, authorize, validate input, pre-check policy</text>

  <line x1="420" y1="280" x2="1280" y2="280" class="arrow"/>
  <text x="850" y="270" text-anchor="middle" class="text">create workflow_run = queued</text>

  <line x1="420" y1="340" x2="740" y2="340" class="arrow"/>
  <text x="580" y="330" text-anchor="middle" class="text">write audit event with request_id</text>

  <line x1="420" y1="400" x2="1060" y2="400" class="arrow"/>
  <text x="740" y="390" text-anchor="middle" class="text">enqueue worker job</text>

  <line x1="420" y1="460" x2="120" y2="460" class="arrow"/>
  <text x="270" y="450" text-anchor="middle" class="text">return workflow_run_id + queued</text>

  <line x1="1060" y1="520" x2="1280" y2="520" class="arrow"/>
  <text x="1170" y="510" text-anchor="middle" class="text">load run + workflow version</text>

  <line x1="1060" y1="580" x2="740" y2="580" class="arrow"/>
  <text x="900" y="570" text-anchor="middle" class="text">step loop: permission, governance, approval, audit, emit events</text>

  <line x1="1060" y1="640" x2="1280" y2="640" class="arrow"/>
  <text x="1170" y="630" text-anchor="middle" class="text">save outputs, status, cost, timestamps</text>

  <line x1="1060" y1="700" x2="420" y2="700" class="arrow"/>
  <text x="740" y="690" text-anchor="middle" class="text">final result ready for polling or streaming</text>

  <line x1="420" y1="730" x2="120" y2="730" class="arrow dash"/>
  <text x="270" y="720" text-anchor="middle" class="text">SSE / status fetch keeps UI updated</text>
</svg>
