<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 720" role="img">
  <title id="title">Per-Shot Generation Loop — 3E Micro-Loop with MCTS Search &amp; VBench Gate</title>
  <desc id="desc">The closed loop that produces one approved shot: explore, examine, enhance; a mandatory visual-anchor keyframe feeds image-to-video; AIQA scores against a VBench scorecard; failing shots are re-routed via MCTS search or prompt optimization until the GateKeeper signs off.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .panel { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 1.5; }
      .panel-blue { fill: #EFF6FF; stroke: #93C5FD; stroke-width: 1.5; }
      .panel-green { fill: #ECFDF5; stroke: #86EFAC; stroke-width: 1.5; }
      .panel-amber { fill: #FFFBEB; stroke: #FCD34D; stroke-width: 1.5; }
      .panel-purple { fill: #F5F3FF; stroke: #C4B5FD; stroke-width: 1.5; }
      .panel-rose { fill: #FFF1F2; stroke: #FDA4AF; stroke-width: 1.5; }
      .panel-dark { fill: #0F172A; stroke: #0F172A; }
      .title { font: 700 25px -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 400 13px -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; fill: #475569; }
      .h1 { font: 700 14px -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; fill: #0F172A; }
      .body { font: 400 11px -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; fill: #334155; }
      .mono { font: 400 10px ui-monospace, Menlo, Consolas, monospace; fill: #475569; }
      .badge { font: 700 9px -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; letter-spacing: 0.6px; fill: #FFFFFF; }
      .lbl { font: 700 10px -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; fill: #475569; }
      .pass { font: 700 11px -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; fill: #059669; }
      .fail { font: 700 11px -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; fill: #E11D48; }
      .footer { font: 400 10px -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; fill: #64748B; }
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#64748B"/></marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#059669"/></marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#E11D48"/></marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.08"/></filter>
  </defs>

  <rect class="bg" x="0" y="0" width="1480" height="720" />
  <text x="40" y="46" class="title">Per-Shot Generation Loop — 3E + MCTS + VBench Gate</text>
  <text x="40" y="70" class="subtitle">How a single approved shot is produced. Every node runs Explore → Examine → Enhance (MAViS 3E).</text>

  <!-- 3E ribbon -->
  <rect x="40" y="92" width="1400" height="26" rx="13" fill="#0F172A"/>
  <text x="60" y="110" class="badge">3E MICRO-LOOP PER NODE:</text>
  <text x="230" y="110" class="badge">EXPLORE candidates</text>
  <text x="400" y="110" class="badge">→  EXAMINE vs rubric</text>
  <text x="600" y="110" class="badge">→  ENHANCE before handoff</text>

  <!-- Node A: Shot card in -->
  <g filter="url(#sh)"><rect class="panel" x="40" y="150" width="180" height="100" rx="12"/></g>
  <rect class="panel-dark" x="40" y="150" width="120" height="22" rx="11"/>
  <text x="54" y="166" class="badge">INPUT · Planner #54</text>
  <text x="56" y="196" class="h1">Shot Card</text>
  <text x="56" y="216" class="body">duration · shot type</text>
  <text x="56" y="232" class="body">intent · refs</text>

  <!-- Node B: Prompt -->
  <g filter="url(#sh)"><rect class="panel-blue" x="270" y="150" width="200" height="100" rx="12"/></g>
  <text x="286" y="176" class="h1">PromptEngineer #46</text>
  <text x="286" y="198" class="body">expanded prompt +</text>
  <text x="286" y="214" class="body">negative prompt + seed</text>
  <text x="286" y="236" class="mono">seed registry (reproducible)</text>

  <!-- Node C: Visual anchor keyframe (mandatory) -->
  <g filter="url(#sh)"><rect class="panel-amber" x="520" y="150" width="220" height="100" rx="12"/></g>
  <rect x="520" y="150" width="220" height="22" rx="11" fill="#D97706"/>
  <text x="534" y="166" class="badge">MANDATORY</text>
  <text x="536" y="196" class="h1">Visual-Anchor Keyframe</text>
  <text x="536" y="216" class="body">Flux/MJ still + char LoRA</text>
  <text x="536" y="234" class="mono">no pure T2V (consistency↓ 7.99→0.55)</text>

  <!-- Node D: I2V -->
  <g filter="url(#sh)"><rect class="panel-green" x="790" y="150" width="220" height="100" rx="12"/></g>
  <text x="806" y="176" class="h1">Image-to-Video</text>
  <text x="806" y="198" class="body">Grok 1.5 I2V (faithful) /</text>
  <text x="806" y="214" class="body">Veo · Kling · Runway</text>
  <text x="806" y="236" class="mono">camera move + motion brush</text>

  <!-- Node E: Audio (parallel) -->
  <g filter="url(#sh)"><rect class="panel-purple" x="790" y="280" width="220" height="86" rx="12"/></g>
  <text x="806" y="306" class="h1">Audio (parallel)</text>
  <text x="806" y="328" class="body">VO #21 · Score #20 · SFX #19</text>
  <text x="806" y="350" class="mono">timed to emotional peak</text>

  <!-- Node F: AIQA + VBench -->
  <g filter="url(#sh)"><rect class="panel" x="1060" y="150" width="220" height="120" rx="12"/></g>
  <rect class="panel-dark" x="1060" y="150" width="220" height="22" rx="11"/>
  <text x="1074" y="166" class="badge">AIQAConsistency #49 · L2</text>
  <text x="1076" y="196" class="h1">VBench Scorecard</text>
  <text x="1076" y="216" class="body">identity ≥0.90 · flicker↓</text>
  <text x="1076" y="232" class="body">motion (VMBench) · aesthetic</text>
  <text x="1076" y="248" class="body">CLIP-T ≥0.32 · spatial</text>
  <text x="1076" y="264" class="mono">MLLM chain-of-query judge</text>

  <!-- Decision diamond -->
  <g filter="url(#sh)">
    <polygon points="1170,320 1250,370 1170,420 1090,370" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/>
  </g>
  <text x="1140" y="368" class="h1">Pass?</text>
  <text x="1126" y="386" class="body">L1·L2·L3</text>

  <!-- Gate / output -->
  <g filter="url(#sh)"><rect class="panel-green" x="1060" y="470" width="220" height="86" rx="12"/></g>
  <rect x="1060" y="470" width="220" height="22" rx="11" fill="#059669"/>
  <text x="1074" y="486" class="badge">GateKeeper #57 · C2PA sign</text>
  <text x="1076" y="516" class="h1">Approved Shot →</text>
  <text x="1076" y="536" class="body">to Editor #9 timeline</text>

  <!-- MCTS / reroute box -->
  <g filter="url(#sh)"><rect class="panel-rose" x="470" y="450" width="430" height="120" rx="12"/></g>
  <rect class="panel-dark" x="470" y="450" width="430" height="22" rx="11"/>
  <text x="484" y="466" class="badge">FAIL → RE-ROUTE (no fixed reroll cap)</text>
  <text x="486" y="496" class="h1">MCTS Clip Search · PromptOptimizer #73</text>
  <text x="486" y="518" class="body">Reviewer runs Monte-Carlo tree search over candidate clips;</text>
  <text x="486" y="534" class="body">OPRO/DSPy auto-tunes the prompt; Identity-GRPO for multi-person.</text>
  <text x="486" y="554" class="mono">same seed family · stronger anchor · CostOptimizer #74 routes cheapest-that-passes</text>

  <!-- Arrows main flow -->
  <line x1="220" y1="200" x2="270" y2="200" stroke="#64748B" stroke-width="2" marker-end="url(#a)"/>
  <line x1="470" y1="200" x2="520" y2="200" stroke="#64748B" stroke-width="2" marker-end="url(#a)"/>
  <line x1="740" y1="200" x2="790" y2="200" stroke="#64748B" stroke-width="2" marker-end="url(#a)"/>
  <line x1="1010" y1="200" x2="1060" y2="200" stroke="#64748B" stroke-width="2" marker-end="url(#a)"/>
  <!-- audio into AIQA -->
  <path d="M 1010 323 L 1040 323 L 1040 240 L 1060 240" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#a)"/>
  <!-- AIQA -> decision -->
  <line x1="1170" y1="270" x2="1170" y2="320" stroke="#64748B" stroke-width="2" marker-end="url(#a)"/>
  <!-- pass -> gate -->
  <line x1="1170" y1="420" x2="1170" y2="470" stroke="#059669" stroke-width="2.5" marker-end="url(#ag)"/>
  <text x="1180" y="448" class="pass">PASS</text>
  <!-- fail -> reroute -->
  <path d="M 1090 370 L 900 370 L 900 470" fill="none" stroke="#E11D48" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="950" y="362" class="fail">FAIL</text>
  <!-- reroute back to prompt/anchor -->
  <path d="M 470 510 L 360 510 L 360 270 L 370 270 L 370 250" fill="none" stroke="#E11D48" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#ar)"/>
  <text x="300" y="380" class="fail" transform="rotate(-90 300 380)">retry with stronger anchor / new candidate</text>

  <text x="40" y="612" class="footer">Refs: visual anchoring (arXiv 2512.16954) · CharCom LoRA (2510.10135) · Identity-GRPO (2510.14256) · VBench (2311.17982) · VMBench (2503.10076) · Video-Bench (2504.04907) · MAViS 3E (2508.08487) · MCTS (2506.10540).</text>
  <text x="40" y="632" class="footer">Quality bar: target shot in ≤3 iterations on the happy path; MCTS expands the search only when L2 fails.</text>
</svg>
