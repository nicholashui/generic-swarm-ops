<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 720" role="img">
  <title id="title">Character-Consistency Identity Stack</title>
  <desc id="desc">The research-grade identity pipeline that keeps characters A, B, C, E, F, J consistent across youth and adult shots: a reference bible, mandatory visual anchoring, per-character LoRA adapters, RL identity reinforcement, memory conditioning, a training-free fallback, and a fine-grained VLM identity audit at the gate.</desc>
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .panel { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 1.5; }
      .panel-blue { fill: #EFF6FF; stroke: #93C5FD; stroke-width: 1.5; }
      .panel-green { fill: #ECFDF5; stroke: #86EFAC; stroke-width: 1.5; }
      .panel-amber { fill: #FFFBEB; stroke: #FCD34D; stroke-width: 1.5; }
      .panel-purple { fill: #F5F3FF; stroke: #C4B5FD; stroke-width: 1.5; }
      .panel-rose { fill: #FFF1F2; stroke: #FDA4AF; stroke-width: 1.5; }
      .panel-dark { fill: #0F172A; stroke: #0F172A; }
      .title { font: 700 25px -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 400 13px -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; fill: #475569; }
      .h1 { font: 700 14px -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; fill: #0F172A; }
      .body { font: 400 11px -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; fill: #334155; }
      .mono { font: 400 10px ui-monospace, Menlo, Consolas, monospace; fill: #475569; }
      .badge { font: 700 9px -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; letter-spacing: 0.6px; fill: #FFFFFF; }
      .metric { font: 700 10px -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; fill: #059669; }
      .cite { font: 400 9px ui-monospace, Menlo, Consolas, monospace; fill: #7C3AED; }
      .footer { font: 400 10px -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; fill: #64748B; }
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#64748B"/></marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.08"/></filter>
  </defs>

  <rect class="bg" x="0" y="0" width="1480" height="720" />
  <text x="40" y="46" class="title">Character-Consistency Identity Stack</text>
  <text x="40" y="70" class="subtitle">Keeps A · B · C · E · F · J consistent across youth→adult shots. Replaces "reference image at 70–90%".</text>

  <!-- Stage 1: Character bible -->
  <g filter="url(#sh)"><rect class="panel-blue" x="40" y="110" width="250" height="170" rx="12"/></g>
  <rect class="panel-dark" x="40" y="110" width="92" height="22" rx="11"/>
  <text x="54" y="126" class="badge">STEP 1 · #15 #5 #47</text>
  <text x="56" y="158" class="h1">Character Bible</text>
  <text x="56" y="180" class="body">Portraits per character ×</text>
  <text x="56" y="196" class="body">age (young + adult)</text>
  <text x="56" y="216" class="body">Consent chain + C2PA</text>
  <text x="56" y="232" class="body">signed identity hashes</text>
  <text x="56" y="258" class="mono">stored by MemoryAgent #58</text>

  <!-- Stage 2: Visual anchoring -->
  <g filter="url(#sh)"><rect class="panel-amber" x="320" y="110" width="250" height="170" rx="12"/></g>
  <rect x="320" y="110" width="250" height="22" rx="11" fill="#D97706"/>
  <text x="334" y="126" class="badge">STEP 2 · MANDATORY · #46</text>
  <text x="336" y="158" class="h1">Visual Anchoring</text>
  <text x="336" y="180" class="body">Locked keyframe before</text>
  <text x="336" y="196" class="body">any image-to-video.</text>
  <text x="336" y="216" class="body">Never pure text-to-video.</text>
  <text x="336" y="238" class="metric">consistency 7.99 → 0.55 if removed</text>
  <text x="336" y="262" class="cite">arXiv 2512.16954</text>

  <!-- Stage 3: per-character LoRA -->
  <g filter="url(#sh)"><rect class="panel-green" x="600" y="110" width="250" height="170" rx="12"/></g>
  <rect class="panel-dark" x="600" y="110" width="92" height="22" rx="11"/>
  <text x="614" y="126" class="badge">STEP 3 · #61</text>
  <text x="616" y="158" class="h1">Per-Character LoRA</text>
  <text x="616" y="180" class="body">One adapter per age:</text>
  <text x="616" y="196" class="mono">A-young, E-adult, …</text>
  <text x="616" y="216" class="body">Frozen backbone, prompt-</text>
  <text x="616" y="232" class="body">aware composition.</text>
  <text x="616" y="252" class="metric">face sim ≥0.85 (ArcFace)</text>
  <text x="616" y="270" class="cite">CharCom · arXiv 2510.10135</text>

  <!-- Stage 4: RL identity -->
  <g filter="url(#sh)"><rect class="panel-purple" x="880" y="110" width="250" height="170" rx="12"/></g>
  <rect class="panel-dark" x="880" y="110" width="92" height="22" rx="11"/>
  <text x="894" y="126" class="badge">STEP 4 · #49</text>
  <text x="896" y="158" class="h1">RL Identity Reinforce</text>
  <text x="896" y="180" class="body">Identity-GRPO for multi-</text>
  <text x="896" y="196" class="body">person shots (Scene 10</text>
  <text x="896" y="212" class="body">family dinner).</text>
  <text x="896" y="234" class="metric">+18.9% multi-human consistency</text>
  <text x="896" y="262" class="cite">arXiv 2510.14256</text>

  <!-- Stage 5: Memory conditioning -->
  <g filter="url(#sh)"><rect class="panel-blue" x="1160" y="110" width="280" height="170" rx="12"/></g>
  <rect class="panel-dark" x="1160" y="110" width="92" height="22" rx="11"/>
  <text x="1174" y="126" class="badge">STEP 5 · #58</text>
  <text x="1176" y="158" class="h1">Memory Conditioning</text>
  <text x="1176" y="180" class="body">Shot-by-shot diffusion</text>
  <text x="1176" y="196" class="body">conditioned on prior-shot</text>
  <text x="1176" y="212" class="body">memory across 14 cards.</text>
  <text x="1176" y="234" class="metric">cross-scene coherence pass</text>
  <text x="1176" y="262" class="cite">StoryMem · arXiv 2512.19539</text>

  <!-- flow arrows -->
  <line x1="290" y1="195" x2="320" y2="195" stroke="#64748B" stroke-width="2" marker-end="url(#a)"/>
  <line x1="570" y1="195" x2="600" y2="195" stroke="#64748B" stroke-width="2" marker-end="url(#a)"/>
  <line x1="850" y1="195" x2="880" y2="195" stroke="#64748B" stroke-width="2" marker-end="url(#a)"/>
  <line x1="1130" y1="195" x2="1160" y2="195" stroke="#64748B" stroke-width="2" marker-end="url(#a)"/>

  <!-- Fallback + Audit row -->
  <g filter="url(#sh)"><rect class="panel-rose" x="320" y="330" width="350" height="120" rx="12"/></g>
  <rect class="panel-dark" x="320" y="330" width="160" height="22" rx="11"/>
  <text x="334" y="346" class="badge">FALLBACK · #98</text>
  <text x="336" y="378" class="h1">Training-Free Consistency</text>
  <text x="336" y="400" class="body">When no clean portrait exists:</text>
  <text x="336" y="416" class="body">consistent background + character</text>
  <text x="336" y="432" class="body">without reference images.</text>
  <text x="490" y="346" class="cite">BachVid · 2510.21696</text>

  <g filter="url(#sh)"><rect class="panel" x="880" y="330" width="350" height="120" rx="12"/></g>
  <rect class="panel-dark" x="880" y="330" width="160" height="22" rx="11"/>
  <text x="894" y="346" class="badge">AUDIT @ GATE · #49</text>
  <text x="896" y="378" class="h1">Fine-Grained ID Audit</text>
  <text x="896" y="400" class="body">VLM identity-preservation eval,</text>
  <text x="896" y="416" class="body">beyond global embeddings.</text>
  <text x="896" y="432" class="metric">fine-grained ID delta &lt; τ → GateKeeper #57</text>
  <text x="1050" y="346" class="cite">arXiv 2511.08087</text>

  <!-- arrows to fallback/audit -->
  <path d="M 445 280 L 445 330" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#a)"/>
  <text x="455" y="312" class="footer">if anchor unavailable</text>
  <path d="M 1005 280 L 1005 330" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#a)"/>
  <text x="1015" y="312" class="footer">every shot audited</text>

  <!-- Reuse note -->
  <g filter="url(#sh)"><rect class="panel-green" x="40" y="490" width="1400" height="70" rx="12"/></g>
  <text x="60" y="518" class="h1">Series reuse:</text>
  <text x="160" y="518" class="body">identity hashes + per-character LoRAs + voice clone persist in MemoryAgent #58, so follow-up episodes reuse ~70% of pre-production and the "map girl" / "shop cat" stay recognizable across the series.</text>
  <text x="60" y="544" class="mono">Output of the stack feeds the per-shot generation loop (visual-anchor keyframe → image-to-video).</text>

  <text x="40" y="600" class="footer">All identity techniques are cited research; thresholds are enforced as L2/L3 gate criteria. Multi-character drift is highest in Scene 10 (family dinner), hence RL reinforcement there.</text>
</svg>
